<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Pulse — Settings</title>
	<style>
		:root {
			--bg: #0e0e12;
			--surface: #17171e;
			--border: #2a2a38;
			--text-primary: #e8e6f0;
			--text-secondary: #8a88a0;
			--text-dim: #5c5a70;
			--accent: #6c5ce7;
			--accent-dim: #6c5ce722;
			--success: #00cec9;
			--danger: #e17055;
			--danger-hover: #ef8265;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			background: var(--bg);
			color: var(--text-primary);
			font-family: 'Segoe UI', system-ui, sans-serif;
			padding: 24px 32px;
			min-height: 100vh;
		}

		.page {
			max-width: 1100px;
			margin: 0 auto;
		}

		.header {
			display: grid;
			grid-template-columns: auto 1fr;
			align-items: baseline;
			gap: 16px;
			margin-bottom: 24px;
			border-bottom: 1px solid var(--border);
			padding-bottom: 12px;
		}

			.header h1 {
				font-size: 24px;
				font-weight: 300;
				letter-spacing: 2px;
				text-transform: uppercase;
			}

				.header h1 span {
					color: var(--accent);
					font-weight: 600;
				}

			.header .subtitle {
				font-size: 12px;
				color: var(--text-dim);
			}

		.section {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 8px;
			padding: 18px 20px;
			margin-bottom: 20px;
		}

			.section-head {
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 12px;
				margin-bottom: 6px;
			}

				.section-head h2 {
					font-size: 14px;
					font-weight: 600;
					letter-spacing: 1px;
					text-transform: uppercase;
					color: var(--text-secondary);
				}

			.section-hint {
				font-size: 12px;
				color: var(--text-dim);
				margin-bottom: 14px;
			}

		.user-table {
			width: 100%;
			border-collapse: collapse;
		}

			.user-table th, .user-table td {
				text-align: left;
				padding: 10px 12px;
				border-bottom: 1px solid var(--border);
				font-size: 13px;
				vertical-align: middle;
			}

			.user-table th {
				font-weight: 600;
				font-size: 11px;
				letter-spacing: 1px;
				text-transform: uppercase;
				color: var(--text-secondary);
			}

			.user-table tr:last-child td {
				border-bottom: 0;
			}

			.user-table .col-name {
				font-weight: 600;
				width: 180px;
			}

			.user-table .col-display {
				width: 200px;
				color: var(--text-secondary);
			}

			.user-table .col-created {
				width: 130px;
				color: var(--text-dim);
				font-family: 'DM Mono', monospace;
				font-size: 11px;
			}

			.user-table .col-admin {
				width: 70px;
				text-align: center;
			}

			.user-table .col-counts {
				color: var(--text-dim);
				font-family: 'DM Mono', monospace;
				font-size: 11px;
				width: 140px;
			}

			.user-table .col-actions {
				width: 200px;
				text-align: right;
			}


		.btn {
			background: transparent;
			border: 1px solid var(--border);
			color: var(--text-primary);
			padding: 6px 12px;
			border-radius: 4px;
			font-size: 12px;
			cursor: pointer;
			font-family: inherit;
		}

			.btn:hover {
				border-color: var(--text-secondary);
			}

			.btn.btn-primary {
				background: var(--accent);
				border-color: var(--accent);
				color: #fff;
			}

				.btn.btn-primary:hover {
					background: #7d6ef0;
					border-color: #7d6ef0;
				}

			.btn.btn-danger {
				color: var(--danger);
				border-color: var(--danger);
			}

				.btn.btn-danger:hover {
					background: var(--danger);
					color: var(--bg);
				}

			.btn.btn-confirm {
				background: var(--danger);
				color: var(--bg);
				border-color: var(--danger);
			}

				.btn.btn-confirm:hover {
					background: var(--danger-hover);
				}

		.action-row {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			flex-wrap: wrap;
			justify-content: flex-end;
		}

			.action-row .confirm-label {
				font-size: 12px;
				color: var(--danger);
			}

		.input {
			background: var(--bg);
			border: 1px solid var(--border);
			color: var(--text-primary);
			padding: 6px 8px;
			border-radius: 4px;
			font-size: 13px;
			font-family: inherit;
			width: 100%;
		}

			.input:focus {
				outline: none;
				border-color: var(--accent);
			}

		.checkbox-cell {
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.empty-state {
			padding: 24px;
			text-align: center;
			color: var(--text-dim);
			font-size: 13px;
		}

		.loading-text {
			padding: 24px;
			text-align: center;
			color: var(--text-dim);
			font-size: 13px;
		}

		.create-form {
			display: none;
			margin-top: 14px;
			padding: 14px;
			border: 1px dashed var(--border);
			border-radius: 6px;
		}

			.create-form.visible {
				display: block;
			}

			.create-form .form-row {
				display: grid;
				grid-template-columns: 1fr 1fr auto auto auto;
				gap: 10px;
				align-items: center;
			}

			.create-form label {
				font-size: 11px;
				color: var(--text-secondary);
				text-transform: uppercase;
				letter-spacing: 1px;
				display: block;
				margin-bottom: 4px;
			}

			.create-form .checkbox-label {
				display: flex;
				align-items: center;
				gap: 6px;
				font-size: 12px;
				color: var(--text-secondary);
			}

			.create-form .form-error {
				color: var(--danger);
				font-size: 12px;
				margin-top: 8px;
				min-height: 16px;
			}

		.toast {
			position: fixed;
			bottom: 24px;
			left: 50%;
			transform: translateX(-50%);
			background: var(--surface);
			border: 1px solid var(--border);
			color: var(--text-primary);
			padding: 10px 18px;
			border-radius: 6px;
			font-size: 13px;
			opacity: 0;
			transition: opacity 0.2s;
			pointer-events: none;
		}

			.toast.visible {
				opacity: 1;
			}

			.toast.error {
				border-color: var(--danger);
				color: var(--danger);
			}

		.login-form {
			margin-top: 8px;
			padding: 14px;
			border: 1px dashed var(--border);
			border-radius: 6px;
		}

			.login-form .form-row {
				display: grid;
				grid-template-columns: 1fr 1fr auto auto auto;
				gap: 10px;
				align-items: center;
			}

			.login-form label {
				font-size: 11px;
				color: var(--text-secondary);
				text-transform: uppercase;
				letter-spacing: 1px;
				display: block;
				margin-bottom: 4px;
			}

			.login-form .checkbox-label {
				display: flex;
				align-items: center;
				gap: 6px;
				font-size: 12px;
				color: var(--text-secondary);
			}

			.login-form .form-error {
				color: var(--danger);
				font-size: 12px;
				margin-top: 8px;
				min-height: 16px;
			}

		.login-state {
			font-size: 12px;
			color: var(--text-secondary);
		}

			.login-state.signed-in {
				color: var(--success);
			}

		.password-row {
			padding: 10px 12px;
			border-bottom: 1px solid var(--border);
			background: rgba(108, 92, 231, 0.05);
		}

			.password-row .form-row {
				display: grid;
				grid-template-columns: 1fr 1fr auto auto;
				gap: 10px;
				align-items: center;
			}

			.password-row label {
				font-size: 11px;
				color: var(--text-secondary);
				text-transform: uppercase;
				letter-spacing: 1px;
				display: block;
				margin-bottom: 4px;
			}

			.password-row .form-error {
				color: var(--danger);
				font-size: 12px;
				margin-top: 8px;
				min-height: 16px;
			}

		.version-tag {
			position: fixed;
			right: 8px;
			bottom: 6px;
			font-family: 'DM Mono', monospace;
			font-size: 10px;
			color: var(--text-dim);
			opacity: 0.55;
			pointer-events: none;
			user-select: none;
			z-index: 1000;
		}
	</style>
</head>
<body>
	<div class="page">
		<div class="header">
			<h1>Pulse<span>/</span>Settings</h1>
			<div class="subtitle">administer the server</div>
		</div>

		<div class="section">
			<div class="section-head">
				<h2>Account</h2>
				<div id="login-state" class="login-state"></div>
			</div>

			<div id="login-form" class="login-form">
				<div class="form-row">
					<div>
						<label for="login-username">Username</label>
						<input type="text" class="input" id="login-username" maxlength="120" autocomplete="username" />
					</div>
					<div>
						<label for="login-password">Password</label>
						<input type="password" class="input" id="login-password" maxlength="200" autocomplete="current-password" />
					</div>
					<label class="checkbox-label"><input type="checkbox" id="login-remember" /> Remember me</label>
					<button class="btn btn-primary" id="login-submit">Sign in</button>
				</div>
				<div class="form-error" id="login-error"></div>
			</div>
		</div>

		<div class="section">
			<div class="section-head">
				<h2>Users</h2>
				<button class="btn btn-primary" id="new-user-btn">New user</button>
			</div>

			<div id="create-form" class="create-form">
				<div class="form-row">
					<div>
						<label for="create-name">Name</label>
						<input type="text" class="input" id="create-name" maxlength="120" autocomplete="off" />
					</div>
					<div>
						<label for="create-display">Display name</label>
						<input type="text" class="input" id="create-display" maxlength="120" autocomplete="off" />
					</div>
					<label class="checkbox-label"><input type="checkbox" id="create-admin" /> Admin</label>
					<button class="btn btn-primary" id="create-submit">Create</button>
					<button class="btn" id="create-cancel">Cancel</button>
				</div>
				<div class="form-error" id="create-error"></div>
			</div>

			<div id="users-container">
				<div class="loading-text">Loading users...</div>
			</div>
		</div>

	</div>

	<div id="toast" class="toast"></div>

	<script>
		// Identity for every data/auth call: uid + device token, read from the
		// same localStorage the rest of the web client uses. No browser session.
		function pulseAuth() {
			let uid = '';
			let token = '';
			try {
				uid = localStorage.getItem('pulse_uid') || '';
				token = localStorage.getItem('pulse_token') || '';
			} catch (e) { uid = ''; token = ''; }
			return 'uid=' + encodeURIComponent(uid) + '&token=' + encodeURIComponent(token);
		}

		function pulseGet(endpoint, callback) {
			let xhr = new XMLHttpRequest();
			xhr.open('GET', '/pulse_v1/' + endpoint + '?' + pulseAuth());
			xhr.onload = function () {
				if (xhr.status === 200) {
					let data = JSON.parse(xhr.responseText);
					callback(data);
				}
				else {
					console.error('HTTP error:', endpoint, xhr.status);
					showToast('Request failed: ' + endpoint, true);
				}
			};
			xhr.send();
		}

		// Adapt PulseUser wire objects (PascalCase, inside the PulseResponse
		// envelope's contents) to the lowercase shape the rest of this page uses.
		function adaptUsers(list) {
			let out = [];
			if (!list) { return out; }
			for (let idx = 0; idx < list.length; idx++) {
				let user = list[idx];
				out.push({
					id: user.Id,
					name: user.Name,
					displayName: user.DisplayName,
					isAdmin: user.IsAdmin
				});
			}
			return out;
		}

		// Success for a mutation route: the envelope returns status === 'ok',
		// while the legacy {ok,error} shape returns ok === true. Accept either.
		function isOk(data) {
			if (!data) { return false; }
			if (data.ok === true) { return true; }
			if (data.status === 'ok') { return true; }
			return false;
		}

		function showToast(message, isError) {
			let toast = document.getElementById('toast');
			toast.textContent = message;
			toast.classList.toggle('error', !!isError);
			toast.classList.add('visible');
			setTimeout(function () { toast.classList.remove('visible'); }, 2500);
		}

		function loadUsers() {
			let container = document.getElementById('users-container');
			container.innerHTML = '<div class="loading-text">Loading users...</div>';
			pulseGet('listUsers', function (data) { renderUsers(adaptUsers(data.contents)); });
		}

		function renderUsers(users) {
			let container = document.getElementById('users-container');
			if (users.length === 0) {
				container.innerHTML = '<div class="empty-state">No users found.</div>';
				return;
			}

			let table = document.createElement('table');
			table.className = 'user-table';

			let head = document.createElement('thead');
			let headRow = document.createElement('tr');
			let columns = [
				{ label: 'Name', cls: 'col-name' },
				{ label: 'Display name', cls: 'col-display' },
				{ label: 'Admin', cls: 'col-admin' },
				{ label: '', cls: 'col-actions' }
			];
			for (let idx = 0; idx < columns.length; idx++) {
				let th = document.createElement('th');
				th.textContent = columns[idx].label;
				th.className = columns[idx].cls;
				headRow.appendChild(th);
			}
			head.appendChild(headRow);
			table.appendChild(head);

			let body = document.createElement('tbody');
			for (let idx = 0; idx < users.length; idx++) {
				body.appendChild(buildUserRow(users[idx]));
			}
			table.appendChild(body);

			container.innerHTML = '';
			container.appendChild(table);
		}

		function buildUserRow(user) {
			let row = document.createElement('tr');
			row.setAttribute('data-user-name', user.name);
			row.setAttribute('data-user-id', user.id);

			let nameCell = document.createElement('td');
			nameCell.className = 'col-name';
			nameCell.textContent = user.name;
			row.appendChild(nameCell);

			let displayCell = document.createElement('td');
			displayCell.className = 'col-display';
			displayCell.textContent = user.displayName || '—';
			row.appendChild(displayCell);

			let adminCell = document.createElement('td');
			adminCell.className = 'col-admin';
			adminCell.textContent = user.isAdmin ? 'Yes' : '';
			row.appendChild(adminCell);

			let actionsCell = document.createElement('td');
			actionsCell.className = 'col-actions';
			renderRowActions(actionsCell, user);
			row.appendChild(actionsCell);

			return row;
		}

		function renderRowActions(actionsCell, user) {
			actionsCell.innerHTML = '';
			let wrapper = document.createElement('span');
			wrapper.className = 'action-row';

			let editBtn = document.createElement('button');
			editBtn.className = 'btn';
			editBtn.textContent = 'Edit';
			editBtn.addEventListener('click', function () { showEditRow(user); });
			wrapper.appendChild(editBtn);

			let passwordBtn = document.createElement('button');
			passwordBtn.className = 'btn';
			passwordBtn.textContent = 'Set password';
			passwordBtn.addEventListener('click', function () { showPasswordRow(user.name); });
			wrapper.appendChild(passwordBtn);

			let deleteBtn = document.createElement('button');
			deleteBtn.className = 'btn btn-danger';
			deleteBtn.textContent = 'Delete';
			deleteBtn.addEventListener('click', function () { showDeleteConfirm(actionsCell, user.name); });
			wrapper.appendChild(deleteBtn);

			actionsCell.appendChild(wrapper);
		}

		function showPasswordRow(userName) {
			let row = document.querySelector('tr[data-user-name="' + cssEscape(userName) + '"]');
			if (!row) { return; }
			let existing = row.nextElementSibling;
			if (existing && existing.classList.contains('password-row')) {
				existing.parentNode.removeChild(existing);
				return;
			}

			let passwordRow = document.createElement('tr');
			passwordRow.className = 'password-row';
			let cell = document.createElement('td');
			cell.colSpan = 4;

			let formRow = document.createElement('div');
			formRow.className = 'form-row';

			let pwWrap = document.createElement('div');
			let pwLabel = document.createElement('label');
			pwLabel.textContent = 'New password';
			pwLabel.setAttribute('for', 'password-input-' + userName);
			let pwInput = document.createElement('input');
			pwInput.type = 'password';
			pwInput.className = 'input';
			pwInput.id = 'password-input-' + userName;
			pwInput.maxLength = 200;
			pwInput.autocomplete = 'new-password';
			pwWrap.appendChild(pwLabel);
			pwWrap.appendChild(pwInput);

			let confirmWrap = document.createElement('div');
			let confirmLabel = document.createElement('label');
			confirmLabel.textContent = 'Confirm';
			confirmLabel.setAttribute('for', 'password-confirm-' + userName);
			let confirmInput = document.createElement('input');
			confirmInput.type = 'password';
			confirmInput.className = 'input';
			confirmInput.id = 'password-confirm-' + userName;
			confirmInput.maxLength = 200;
			confirmInput.autocomplete = 'new-password';
			confirmWrap.appendChild(confirmLabel);
			confirmWrap.appendChild(confirmInput);

			let saveBtn = document.createElement('button');
			saveBtn.className = 'btn btn-primary';
			saveBtn.textContent = 'Save password';

			let cancelBtn = document.createElement('button');
			cancelBtn.className = 'btn';
			cancelBtn.textContent = 'Cancel';

			let errorDiv = document.createElement('div');
			errorDiv.className = 'form-error';

			function submitPassword() {
				errorDiv.textContent = '';
				let pw = pwInput.value;
				let confirm = confirmInput.value;
				if (pw !== confirm) {
					errorDiv.textContent = 'Passwords do not match.';
					return;
				}
				let userId = row.getAttribute('data-user-id');
				runSetPassword(userId, pw, function (ok, message) {
					if (ok) {
						showToast('Password set for ' + userName);
						passwordRow.parentNode.removeChild(passwordRow);
					}
					else {
						errorDiv.textContent = message;
					}
				});
			}

			function cancelPassword() {
				passwordRow.parentNode.removeChild(passwordRow);
			}

			saveBtn.addEventListener('click', submitPassword);
			cancelBtn.addEventListener('click', cancelPassword);
			confirmInput.addEventListener('keydown', function (event) {
				if (event.key === 'Enter') { submitPassword(); }
				else if (event.key === 'Escape') { cancelPassword(); }
			});
			pwInput.addEventListener('keydown', function (event) {
				if (event.key === 'Escape') { cancelPassword(); }
			});

			formRow.appendChild(pwWrap);
			formRow.appendChild(confirmWrap);
			formRow.appendChild(saveBtn);
			formRow.appendChild(cancelBtn);
			cell.appendChild(formRow);
			cell.appendChild(errorDiv);
			passwordRow.appendChild(cell);

			row.parentNode.insertBefore(passwordRow, row.nextSibling);
			pwInput.focus();
		}

		function describeAuthOutcome(outcome) {
			if (outcome === 'PasswordTooShort') {
				return "Password does not meet the server's requirements";
			}
			if (outcome === 'InvalidCredentials') {
				return 'Invalid credentials';
			}
			if (outcome === 'NotSignedIn') {
				return 'Sign in first';
			}
			if (outcome === 'Forbidden') {
				return 'Not allowed';
			}
			if (outcome === 'UnknownUser') {
				return 'Unknown user';
			}
			if (outcome === 'RateLimited') {
				return 'Too many attempts. Try again in a few minutes.';
			}
			return 'Request failed';
		}

		// Parses the JSON envelope and returns it, or null if the response was
		// not parseable JSON. Lets callers branch on status/contents directly.
		function parseAuthEnvelope(responseText) {
			let parsed = null;
			try { parsed = JSON.parse(responseText); } catch (e) { parsed = null; }
			return parsed;
		}

		function runSetPassword(userId, password, callback) {
			let xhr = new XMLHttpRequest();
			xhr.open('POST', '/pulse_v1/setPassword?' + pulseAuth());
			xhr.setRequestHeader('Content-Type', 'application/json');
			xhr.onload = function () {
				let parsed = parseAuthEnvelope(xhr.responseText);
				let outcome = '';
				if (parsed && parsed.contents) {
					outcome = parsed.contents.Outcome;
				}
				if (outcome === 'Ok') {
					callback(true, '');
					return;
				}
				callback(false, describeAuthOutcome(outcome));
			};
			xhr.onerror = function () { callback(false, 'Network error'); };
			let payload = JSON.stringify({ Id: userId, Password: password });
			xhr.send(payload);
		}

		function runLogin(username, password, rememberMe, callback) {
			let xhr = new XMLHttpRequest();
			xhr.open('POST', '/pulse_v1/login');
			xhr.setRequestHeader('Content-Type', 'application/json');
			xhr.onload = function () {
				let parsed = parseAuthEnvelope(xhr.responseText);
				let outcome = '';
				if (parsed && parsed.contents) {
					outcome = parsed.contents.Outcome;
				}
				if (outcome === 'Ok') {
					try {
						localStorage.setItem('pulse_token', parsed.contents.Token);
						localStorage.setItem('pulse_uid', parsed.contents.Id);
					} catch (e) {}
					callback(true, parsed.contents, '');
					return;
				}
				callback(false, null, describeAuthOutcome(outcome));
			};
			xhr.onerror = function () { callback(false, null, 'Network error'); };
			let payload = JSON.stringify({ Username: username, Password: password, RememberMe: rememberMe });
			xhr.send(payload);
		}

		function submitLogin() {
			let username = document.getElementById('login-username').value.trim();
			let password = document.getElementById('login-password').value;
			let rememberMe = document.getElementById('login-remember').checked;
			let errEl = document.getElementById('login-error');
			errEl.textContent = '';
			if (!username || !password) {
				errEl.textContent = 'Username and password are required.';
				return;
			}
			runLogin(username, password, rememberMe, function (ok, data, message) {
				if (ok) {
					document.getElementById('login-password').value = '';
					setLoginState(data.Username, data.IsAdmin);
					showToast('Signed in as ' + data.Username);
				}
				else {
					errEl.textContent = message;
				}
			});
		}

		function setLoginState(userName, isAdmin) {
			let stateEl = document.getElementById('login-state');
			let loginForm = document.getElementById('login-form');
			if (userName) {
				let suffix = '';
				if (isAdmin) { suffix = ' (admin)'; }
				stateEl.textContent = 'Signed in as ' + userName + suffix;
				stateEl.classList.add('signed-in');
				loginForm.style.display = 'none';
			}
			else {
				stateEl.textContent = 'Not signed in';
				stateEl.classList.remove('signed-in');
				loginForm.style.display = '';
			}
		}

		function checkSession() {
			let xhr = new XMLHttpRequest();
			xhr.open('GET', '/pulse_v1/whoami?' + pulseAuth());
			xhr.onload = function () {
				let parsed = parseAuthEnvelope(xhr.responseText);
				if (parsed && parsed.contents && parsed.contents.State === 'SignedIn') {
					setLoginState(parsed.contents.Username, parsed.contents.IsAdmin);
					return;
				}
				setLoginState('', false);
			};
			xhr.onerror = function () { setLoginState('', false); };
			xhr.send();
		}

		function showDeleteConfirm(actionsCell, userName) {
			actionsCell.innerHTML = '';

			let wrapper = document.createElement('span');
			wrapper.className = 'action-row';

			let label = document.createElement('span');
			label.className = 'confirm-label';
			label.textContent = 'Delete ' + userName + '?';
			wrapper.appendChild(label);

			let confirmBtn = document.createElement('button');
			confirmBtn.className = 'btn btn-confirm';
			confirmBtn.textContent = 'Confirm';
			confirmBtn.addEventListener('click', function () { runDelete(userName); });
			wrapper.appendChild(confirmBtn);

			let cancelBtn = document.createElement('button');
			cancelBtn.className = 'btn';
			cancelBtn.textContent = 'Cancel';
			cancelBtn.addEventListener('click', function () { loadUsers(); });
			wrapper.appendChild(cancelBtn);

			actionsCell.appendChild(wrapper);
		}

		function showEditRow(user) {
			let row = document.querySelector('tr[data-user-name="' + cssEscape(user.name) + '"]');
			if (!row) { return; }

			let nameCell = row.querySelector('.col-name');
			let displayCell = row.querySelector('.col-display');
			let adminCell = row.querySelector('.col-admin');
			let actionsCell = row.querySelector('.col-actions');

			let nameInput = document.createElement('input');
			nameInput.type = 'text';
			nameInput.className = 'input';
			nameInput.value = user.name;
			nameInput.maxLength = 120;
			nameCell.innerHTML = '';
			nameCell.appendChild(nameInput);

			let displayInput = document.createElement('input');
			displayInput.type = 'text';
			displayInput.className = 'input';
			displayInput.value = user.displayName || '';
			displayInput.maxLength = 120;
			displayCell.innerHTML = '';
			displayCell.appendChild(displayInput);

			let adminInput = document.createElement('input');
			adminInput.type = 'checkbox';
			adminInput.checked = !!user.isAdmin;
			adminCell.innerHTML = '';
			let adminWrap = document.createElement('div');
			adminWrap.className = 'checkbox-cell';
			adminWrap.appendChild(adminInput);
			adminCell.appendChild(adminWrap);

			actionsCell.innerHTML = '';
			let wrapper = document.createElement('span');
			wrapper.className = 'action-row';

			let saveBtn = document.createElement('button');
			saveBtn.className = 'btn btn-primary';
			saveBtn.textContent = 'Save';
			saveBtn.addEventListener('click', function () {
				runUpdate(user.name, nameInput.value.trim(), displayInput.value.trim(), adminInput.checked);
			});
			wrapper.appendChild(saveBtn);

			let cancelBtn = document.createElement('button');
			cancelBtn.className = 'btn';
			cancelBtn.textContent = 'Cancel';
			cancelBtn.addEventListener('click', function () { loadUsers(); });
			wrapper.appendChild(cancelBtn);

			actionsCell.appendChild(wrapper);
			nameInput.focus();
		}

		function cssEscape(value) {
			if (window.CSS && window.CSS.escape) { return window.CSS.escape(value); }
			return value.replace(/(["\\])/g, '\\$1');
		}

		function runDelete(userName) {
			let url = '/pulse_v1/deleteUser?user=' + encodeURIComponent(userName) + '&' + pulseAuth();
			postPulse(url, function (data) {
				if (isOk(data)) { showToast('Deleted ' + userName); }
				else { showToast('Delete failed: ' + (data.status || 'unknown error'), true); }
				loadUsers();
			});
		}

		function runUpdate(oldName, newName, displayName, isAdmin) {
			if (!newName) { showToast('Name is required', true); return; }
			let url = '/pulse_v1/updateUser?name=' + encodeURIComponent(oldName)
				+ '&newName=' + encodeURIComponent(newName)
				+ '&displayName=' + encodeURIComponent(displayName)
				+ '&isAdmin=' + (isAdmin ? 'true' : 'false')
				+ '&' + pulseAuth();
			postPulse(url, function (data) {
				if (isOk(data)) { showToast('Saved ' + newName); }
				else { showToast('Update failed: ' + (data.status || 'unknown error'), true); }
				loadUsers();
			});
		}

		function postPulse(url, callback) {
			let xhr = new XMLHttpRequest();
			xhr.open('GET', url);
			xhr.onload = function () {
				if (xhr.status === 200) {
					callback(JSON.parse(xhr.responseText));
				}
				else {
					showToast('Request failed (HTTP ' + xhr.status + ')', true);
					callback({ ok: false });
				}
			};
			xhr.send();
		}

		function showCreateForm() {
			let form = document.getElementById('create-form');
			form.classList.add('visible');
			document.getElementById('create-error').textContent = '';
			document.getElementById('create-name').value = '';
			document.getElementById('create-display').value = '';
			document.getElementById('create-admin').checked = false;
			document.getElementById('create-name').focus();
		}

		function hideCreateForm() {
			document.getElementById('create-form').classList.remove('visible');
		}

		function submitCreate() {
			let name = document.getElementById('create-name').value.trim();
			let displayName = document.getElementById('create-display').value.trim();
			let isAdmin = document.getElementById('create-admin').checked;
			let errEl = document.getElementById('create-error');
			errEl.textContent = '';
			if (!name) { errEl.textContent = 'Name is required.'; return; }

			let url = '/pulse_v1/createUser?name=' + encodeURIComponent(name)
				+ '&displayName=' + encodeURIComponent(displayName)
				+ '&isAdmin=' + (isAdmin ? 'true' : 'false')
				+ '&' + pulseAuth();
			postPulse(url, function (data) {
				if (isOk(data)) {
					hideCreateForm();
					showToast('Created ' + name);
					loadUsers();
				}
				else {
					errEl.textContent = data.status || 'Create failed';
				}
			});
		}

		function wireUp() {
			document.getElementById('new-user-btn').addEventListener('click', showCreateForm);
			document.getElementById('create-cancel').addEventListener('click', hideCreateForm);
			document.getElementById('create-submit').addEventListener('click', submitCreate);
			document.getElementById('create-name').addEventListener('keydown', function (event) {
				if (event.key === 'Enter') { submitCreate(); }
				else if (event.key === 'Escape') { hideCreateForm(); }
			});
			document.getElementById('create-display').addEventListener('keydown', function (event) {
				if (event.key === 'Enter') { submitCreate(); }
				else if (event.key === 'Escape') { hideCreateForm(); }
			});

			document.getElementById('login-submit').addEventListener('click', submitLogin);
			document.getElementById('login-username').addEventListener('keydown', function (event) {
				if (event.key === 'Enter') { submitLogin(); }
			});
			document.getElementById('login-password').addEventListener('keydown', function (event) {
				if (event.key === 'Enter') { submitLogin(); }
			});

			checkSession();
		}

		function loadVersionTag() {
			let request = new XMLHttpRequest();
			request.open('GET', '/pulse_v1/version');
			request.onload = function () {
				if (request.status !== 200) { return; }
				let data = JSON.parse(request.responseText);
				if (!data || !data.contents || !data.contents.Version) { return; }
				let tagEl = document.getElementById('pulse-version-tag');
				if (tagEl) { tagEl.textContent = 'v' + data.contents.Version; }
			};
			request.send();
		}

		document.addEventListener('DOMContentLoaded', function () {
			wireUp();
			loadUsers();
			loadVersionTag();
		});
	</script>
	<div id="pulse-version-tag" class="version-tag"></div>
</body>
</html>
