name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Pulse/Pulse.csproj

      - name: Build
        run: dotnet build Pulse/Pulse.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Pulse/Pulse.csproj --configuration Release --no-build --output publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pulse-win-x64-${{ github.sha }}
          path: publish/
          retention-days: 30
          if-no-files-found: error
