<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Pulse</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
	<style>
		:root {
			--bg-deep: #0a0a0c;
			--bg-surface: #121215;
			--bg-raised: #1a1a1f;
			--bg-hover: #222228;
			--bg-active: #2a2a32;
			--border: #2a2a32;
			--border-subtle: #1e1e24;
			--text-primary: #e8e8ec;
			--text-secondary: #8888a0;
			--text-dim: #555568;
			--accent: #3b82f6;
			--accent-dim: #3b82f620;
			--accent-hover: #60a5fa;
			--danger: #b83030;
			--scrollbar-thumb: #2a2a32;
			--scrollbar-track: transparent;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			-webkit-tap-highlight-color: transparent;
		}

		body {
			background: var(--bg-deep);
			color: var(--text-primary);
			font-family: 'DM Sans', sans-serif;
			font-weight: 400;
			font-size: 16px;
			overflow: hidden;
			width: 100vw;
			height: 100vh;
			display: flex;
			flex-direction: column;
			touch-action: manipulation;
		}

		::-webkit-scrollbar {
			width: 6px;
			height: 6px;
		}

		::-webkit-scrollbar-track {
			background: var(--scrollbar-track);
		}

		::-webkit-scrollbar-thumb {
			background: var(--scrollbar-thumb);
			border-radius: 3px;
		}

		/* HEADER */
		#header {
			height: 64px;
			min-height: 64px;
			background: var(--bg-surface);
			border-bottom: 1px solid var(--border-subtle);
			display: flex;
			align-items: center;
			padding: 0 24px;
			gap: 20px;
			z-index: 10;
		}

		#header-left {
			display: flex;
			align-items: center;
			gap: 16px;
		}

		#logo {
			height: 55px;
			width: auto;
		}

		#back-btn {
			width: 48px;
			height: 48px;
			display: none;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			color: var(--text-dim);
			border-radius: 8px;
			transition: background 0.15s, color 0.15s;
			background: none;
			border: none;
		}

			#back-btn:hover, #back-btn:active {
				background: var(--bg-hover);
				color: var(--text-primary);
			}

		#header-center {
			flex: 1;
			display: flex;
			justify-content: center;
		}

		#search-container {
			position: relative;
			width: 400px;
			max-width: 100%;
		}

		#search-input {
			width: 100%;
			padding: 10px 14px 10px 40px;
			background: var(--bg-raised);
			border: 1px solid var(--border);
			border-radius: 8px;
			color: var(--text-primary);
			font-family: 'DM Sans', sans-serif;
			font-size: 14px;
			outline: none;
			transition: border-color 0.15s;
		}

			#search-input::placeholder {
				color: var(--text-dim);
			}

			#search-input:focus {
				border-color: var(--accent);
			}

		#search-icon {
			position: absolute;
			left: 12px;
			top: 50%;
			transform: translateY(-50%);
			color: var(--text-dim);
			pointer-events: none;
		}

		#header-right {
			display: flex;
			align-items: center;
			gap: 8px;
			color: var(--text-secondary);
			font-family: 'DM Mono', monospace;
			font-size: 24px;
			min-width: 180px;
			justify-content: flex-end;
		}

		/* MAIN 3-PANEL */
		#main-layout {
			flex: 1;
			display: flex;
			overflow: hidden;
		}

		/* Left Panel */
		#left-panel {
			width: 280px;
			min-width: 280px;
			background: var(--bg-surface);
			border-right: 1px solid var(--border-subtle);
			display: flex;
			flex-direction: column;
			user-select: none;
		}

		#left-tabs {
			display: flex;
			padding: 12px 12px 0 12px;
			gap: 4px;
		}

		.left-tab {
			flex: 1;
			padding: 10px 0;
			text-align: center;
			font-size: 13px;
			font-weight: 500;
			color: var(--text-dim);
			cursor: pointer;
			border-radius: 8px;
			transition: background 0.15s, color 0.15s;
			border: none;
			background: none;
			min-height: 44px;
		}

			.left-tab:hover, .left-tab:active {
				background: var(--bg-hover);
				color: var(--text-primary);
			}

			.left-tab.active {
				background: var(--accent-dim);
				color: var(--accent);
			}

		#left-sort {
			display: flex;
			padding: 8px 12px;
			gap: 4px;
		}

		.sort-btn {
			padding: 6px 10px;
			font-size: 11px;
			font-weight: 500;
			color: var(--text-dim);
			cursor: pointer;
			border-radius: 6px;
			border: none;
			background: none;
			transition: background 0.15s, color 0.15s;
			letter-spacing: 0.03em;
			min-height: 32px;
		}

			.sort-btn:hover, .sort-btn:active {
				background: var(--bg-hover);
				color: var(--text-primary);
			}

			.sort-btn.active {
				color: var(--accent);
			}

		#left-list {
			flex: 1;
			overflow-y: auto;
			padding: 0 8px 12px 8px;
		}

		.left-item {
			display: flex;
			align-items: center;
			gap: 12px;
			padding: 10px 12px;
			border-radius: 8px;
			cursor: pointer;
			transition: background 0.15s;
			min-height: 52px;
		}

			.left-item:hover, .left-item:active {
				background: var(--bg-hover);
			}

			.left-item.active {
				background: var(--accent-dim);
			}

		.left-item-art {
			width: 40px;
			height: 40px;
			border-radius: 6px;
			background: var(--bg-raised);
			flex-shrink: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-dim);
			font-size: 14px;
			overflow: hidden;
		}

			.left-item-art.round {
				border-radius: 50%;
			}

			.left-item-art img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

		.left-item-text {
			min-width: 0;
			flex: 1;
		}

		.left-item-name {
			font-size: 14px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.left-item-sub {
			font-size: 12px;
			color: var(--text-dim);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		/* Center Panel */
		#center-panel {
			flex: 1;
			overflow-y: auto;
			padding: 20px 24px;
			display: flex;
			flex-direction: column;
			gap: 32px;
		}

		.center-view {
			display: none;
		}

			.center-view.active {
				display: block;
			}

		.quick-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 8px;
		}

		.quick-item {
			display: flex;
			align-items: center;
			gap: 12px;
			padding: 0;
			background: var(--bg-raised);
			border-radius: 8px;
			cursor: pointer;
			transition: background 0.15s;
			overflow: hidden;
			min-height: 56px;
		}

		.quick-item:hover, .quick-item:active {
			background: var(--bg-hover);
		}
		.quick-item-play {
			width: 36px;
			height: 36px;
			flex-shrink: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			border: none;
			border-radius: 50%;
			background: var(--text-primary);
			color: var(--bg-deep);
			cursor: pointer;
			transition: transform 0.1s;
			margin-right: 10px;
			margin-left: auto;
		}

		.quick-item-play:hover, .quick-item-play:active {
			transform: scale(1.06);
		}
		.quick-item-art {
			width: 56px;
			height: 56px;
			background: var(--bg-active);
			flex-shrink: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-dim);
			font-size: 18px;
			overflow: hidden;
		}

			.quick-item-art img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

		.quick-item-name {
			font-size: 14px;
			font-weight: 500;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			padding-right: 12px;
		}

		.carousel-header {
			font-size: 18px;
			font-weight: 500;
			margin-bottom: 14px;
		}

		.carousel-scroll {
			display: flex;
			gap: 16px;
			overflow-x: auto;
			padding-bottom: 8px;
			scroll-snap-type: x mandatory;
		}

		.carousel-card {
			flex-shrink: 0;
			width: 160px;
			cursor: pointer;
			scroll-snap-align: start;
			transition: transform 0.15s;
		}

			.carousel-card:active {
				transform: scale(0.97);
			}

		.carousel-card-art {
			width: 160px;
			height: 160px;
			background: var(--bg-raised);
			border-radius: 8px;
			margin-bottom: 8px;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-dim);
			font-size: 32px;
			overflow: hidden;
		}

			.carousel-card-art.round {
				border-radius: 50%;
			}

			.carousel-card-art img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

		.carousel-card-name {
			font-size: 14px;
			font-weight: 500;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.carousel-card-sub {
			font-size: 12px;
			color: var(--text-secondary);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			margin-top: 2px;
		}

		/* Detail views */
		.detail-header {
			display: flex;
			align-items: flex-end;
			gap: 24px;
			margin-bottom: 28px;
		}

		.detail-art {
			width: 180px;
			height: 180px;
			background: var(--bg-raised);
			border-radius: 8px;
			flex-shrink: 0;
			overflow: hidden;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-dim);
			font-size: 48px;
		}

			.detail-art img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

		.detail-info {
			display: flex;
			flex-direction: column;
			gap: 4px;
		}

		.detail-label {
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.1em;
			text-transform: uppercase;
			color: var(--text-dim);
		}

		.detail-name {
			font-size: 28px;
			font-weight: 300;
		}

		.detail-sub {
			font-size: 15px;
			color: var(--text-secondary);
			cursor: pointer;
			transition: color 0.15s;
		}

			.detail-sub:hover {
				color: var(--text-primary);
			}

		.detail-meta {
			font-size: 13px;
			color: var(--text-dim);
			margin-top: 4px;
		}

		.detail-actions {
			display: flex;
			gap: 10px;
			margin-top: 12px;
		}

		.btn {
			padding: 10px 20px;
			border-radius: 8px;
			font-family: 'DM Sans', sans-serif;
			font-size: 14px;
			font-weight: 500;
			cursor: pointer;
			border: none;
			transition: background 0.15s;
			min-height: 44px;
		}

		.btn-primary {
			background: var(--accent);
			color: #fff;
		}

			.btn-primary:hover, .btn-primary:active {
				background: var(--accent-hover);
			}

		.btn-ghost {
			background: transparent;
			color: var(--text-secondary);
			border: 1px solid var(--border);
		}

			.btn-ghost:hover, .btn-ghost:active {
				background: var(--bg-hover);
				color: var(--text-primary);
			}

		.track-list-header {
			display: grid;
			grid-template-columns: 40px 1fr 1fr 64px 44px;
			padding: 0 12px 8px 12px;
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: var(--text-dim);
			border-bottom: 1px solid var(--border-subtle);
			margin-bottom: 2px;
		}

		.track-row {
			display: grid;
			grid-template-columns: 40px 1fr 1fr 64px 44px;
			padding: 10px 12px;
			border-radius: 6px;
			align-items: center;
			cursor: pointer;
			transition: background 0.1s;
			min-height: 48px;
		}

			.track-row:hover, .track-row:active {
				background: var(--bg-hover);
			}

			.track-row.playing {
				background: var(--accent-dim);
			}

		.track-num {
			font-family: 'DM Mono', monospace;
			font-size: 12px;
			color: var(--text-dim);
		}

		.track-title-col {
			display: flex;
			flex-direction: column;
			gap: 1px;
			min-width: 0;
		}

		.track-title {
			font-size: 14px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.track-artist-sub {
			font-size: 12px;
			color: var(--text-secondary);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.track-album {
			font-size: 13px;
			color: var(--text-secondary);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.track-duration {
			font-family: 'DM Mono', monospace;
			font-size: 12px;
			color: var(--text-dim);
			text-align: right;
		}

		.track-row.playlist-row {
			grid-template-columns: 28px 40px 1fr 1fr 64px 44px;
		}

		.track-drag-handle {
			display: flex;
			align-items: center;
			justify-content: center;
			width: 28px;
			height: 32px;
			color: var(--text-dim);
			cursor: grab;
			touch-action: none;
			user-select: none;
		}

			.track-drag-handle:hover, .track-drag-handle:active {
				color: var(--text-primary);
			}

			.track-drag-handle:active {
				cursor: grabbing;
			}

		.track-row.dragging {
			opacity: 0.4;
		}

		.track-row.drop-before {
			box-shadow: inset 0 2px 0 0 var(--accent);
		}

		.track-row.drop-after {
			box-shadow: inset 0 -2px 0 0 var(--accent);
		}

		.track-menu-btn {
			width: 44px;
			height: 44px;
			display: flex;
			align-items: center;
			justify-content: center;
			background: none;
			border: none;
			color: var(--text-dim);
			cursor: pointer;
			border-radius: 50%;
			transition: background 0.15s, color 0.15s;
		}

			.track-menu-btn:hover, .track-menu-btn:active {
				background: var(--bg-hover);
				color: var(--text-primary);
			}

		.view-heading {
			font-size: 24px;
			font-weight: 300;
			margin-bottom: 6px;
		}

		.view-subheading {
			font-size: 13px;
			color: var(--text-dim);
			margin-bottom: 24px;
		}

		.album-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
			gap: 16px;
		}

		.search-section-title {
			font-size: 18px;
			font-weight: 300;
			margin-bottom: 12px;
			margin-top: 20px;
		}

			.search-section-title:first-child {
				margin-top: 0;
			}

		/* Right Panel */
		#right-panel {
			width: 300px;
			min-width: 300px;
			background: var(--bg-surface);
			border-left: 1px solid var(--border-subtle);
			display: flex;
			flex-direction: column;
			align-items: center;
			padding: 24px 20px;
			user-select: none;
		}

		#np-art {
			width: 260px;
			height: 260px;
			background: var(--bg-raised);
			border-radius: 10px;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-dim);
			font-size: 48px;
			overflow: hidden;
			margin-bottom: 20px;
		}

			#np-art img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

		#np-title {
			font-size: 18px;
			font-weight: 500;
			text-align: center;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			width: 100%;
			margin-bottom: 4px;
		}

		#np-artist {
			font-size: 14px;
			color: var(--text-secondary);
			text-align: center;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			width: 100%;
			margin-bottom: 2px;
		}

		#np-album {
			font-size: 13px;
			color: var(--text-dim);
			text-align: center;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			width: 100%;
			margin-bottom: 20px;
		}

		#np-empty {
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-dim);
			font-size: 14px;
		}

		#np-content {
			width: 100%;
			display: none;
		}

		#np-divider {
			width: 100%;
			height: 1px;
			background: var(--border-subtle);
			margin: 20px 0 16px 0;
		}

		#np-next-label {
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: var(--text-dim);
			margin-bottom: 10px;
			align-self: flex-start;
		}

		#np-next-item {
			display: flex;
			align-items: center;
			gap: 12px;
			width: 100%;
			padding: 8px;
			border-radius: 8px;
			cursor: pointer;
			transition: background 0.15s;
		}

			#np-next-item:hover {
				background: var(--bg-hover);
			}

		#np-next-art {
			width: 44px;
			height: 44px;
			border-radius: 6px;
			background: var(--bg-raised);
			flex-shrink: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-dim);
			font-size: 14px;
			overflow: hidden;
		}

			#np-next-art img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

		#np-next-text {
			min-width: 0;
		}

		#np-next-title {
			font-size: 13px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		#np-next-artist {
			font-size: 12px;
			color: var(--text-dim);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		/* FOOTER */
		#player-bar {
			height: 80px;
			min-height: 80px;
			background: var(--bg-surface);
			border-top: 1px solid var(--border-subtle);
			display: flex;
			align-items: center;
			padding: 0 24px;
			gap: 24px;
		}

		#player-track-info {
			display: flex;
			align-items: center;
			gap: 12px;
			width: 240px;
			min-width: 240px;
		}

		#player-art {
			width: 52px;
			height: 52px;
			background: var(--bg-raised);
			border-radius: 6px;
			flex-shrink: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-dim);
			font-size: 18px;
			overflow: hidden;
		}

			#player-art img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

		#player-text {
			min-width: 0;
		}

		#player-title {
			font-size: 14px;
			font-weight: 500;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		#player-artist-name {
			font-size: 12px;
			color: var(--text-secondary);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			margin-top: 1px;
		}

		#player-controls {

		#player-volume {

		#volume-slider {

			height: 6px;

			bottom: -14px;
			left: 0;
			right: 0;

		/* Menus */
		#track-menu {
			display: none;
			position: fixed;
			background: var(--bg-raised);
			border: 1px solid var(--border);

		#playlist-picker {
			display: none;

			background: var(--bg-raised);
			border: 1px solid var(--border);

					background: var(--bg);

					font-size: 13px;
					margin-bottom: 8px;

					gap: 6px;
				}

				#playlist-picker .picker-new-form button {

					padding: 8px 10px;

					border: none;

				#playlist-picker .picker-new-form .btn-ok {

				}

				#playlist-picker .picker-new-form .btn-cancel {
					background: transparent;
					color: var(--text-dim);
				}

		/* Left-rail new-playlist / add-podcast control */

		}

		.left-icon-btn {

			border: none;
			color: var(--text-dim);

			gap: 6px;

			.left-icon-btn:hover, .left-icon-btn:active {

				font-size: 13px;
				margin-bottom: 6px;

				min-height: 32px;
			}

			#left-new-playlist-form .btn-ok, #left-new-podcast-form .btn-ok {
				background: var(--accent);
				color: white;
			}

			#left-new-playlist-form .btn-cancel, #left-new-podcast-form .btn-cancel {
				background: transparent;
				color: var(--text-dim);
			}

			.form-error {
				color: var(--danger);
				font-size: 11px;
				margin-bottom: 6px;
				min-height: 14px;
			}

		/* Playlist detail kebab + popup menu */
		.detail-kebab-btn {
			background: none;
			border: none;
			color: var(--text-dim);
			cursor: pointer;
			width: 36px;
			height: 36px;
			border-radius: 8px;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: background 0.15s, color 0.15s;
			margin-left: 8px;
		}

			.detail-kebab-btn:hover, .detail-kebab-btn:active {
				background: var(--bg-hover);
				color: var(--text-primary);
			}

		#playlist-menu {
			display: none;
			position: fixed;
			background: var(--bg-raised);
			border: 1px solid var(--border);
			border-radius: 8px;
			padding: 4px 0;
			min-width: 200px;
			z-index: 102;
			box-shadow: 0 8px 24px rgba(0,0,0,0.4);
		}

			#playlist-menu .menu-item {
				padding: 12px 16px;
				font-size: 14px;
				cursor: pointer;
				color: var(--text-primary);
				display: flex;
				align-items: center;
				min-height: 44px;
			}

				#playlist-menu .menu-item:hover, #playlist-menu .menu-item:active {
					background: var(--bg-hover);
				}

				#playlist-menu .menu-item.danger {
					color: var(--danger);
				}

			max-width: 360px;
			z-index: 103;
			box-shadow: 0 8px 24px rgba(0,0,0,0.4);

				justify-content: flex-end;
			}

			#confirm-dialog button {
				padding: 8px 16px;
				font-size: 13px;

				border: none;

				min-width: 80px;
			}

			#confirm-dialog .btn-danger {
				background: var(--danger);
				color: white;
			}

			#confirm-dialog .btn-cancel {
				background: transparent;
				color: var(--text-dim);
			}

		/* Inline rename / edit form on playlist detail */
		.detail-edit-form {
			display: none;
			margin-top: 8px;
		}

			.detail-edit-form input, .detail-edit-form textarea {
				width: 100%;

				min-height: 80px;
				resize: vertical;
			}

			.detail-edit-form .row {
				display: flex;
				gap: 8px;
			}

			.detail-edit-form button {
				padding: 8px 14px;
				font-size: 12px;
				border-radius: 6px;
				border: none;
				cursor: pointer;
				min-height: 32px;
			}

			.detail-edit-form .btn-ok {
				background: var(--accent);
				color: white;
			}

			.detail-edit-form .btn-cancel {
				background: transparent;
				color: var(--text-dim);
			}

			#playlist-picker .picker-header {
				padding: 8px 16px;
				font-size: 11px;
				font-weight: 600;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: var(--text-dim);
				border-bottom: 1px solid var(--border-subtle);
			}

			#playlist-picker .picker-item {
				padding: 12px 16px;
				font-size: 14px;
				cursor: pointer;
				color: var(--text-primary);
				transition: background 0.1s;
				min-height: 44px;
				display: flex;
				align-items: center;
			}

				#playlist-picker .picker-item:hover, #playlist-picker .picker-item:active {
					background: var(--bg-hover);
				}

		.empty-state {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 200px;
			color: var(--text-dim);
			gap: 6px;
		}

		.empty-state-text {
			font-size: 14px;
			font-weight: 300;
		}

		.loading-text {
			color: var(--text-dim);
			font-size: 13px;
			padding: 16px 0;
		}

		.version-tag {
			position: fixed;
			right: 8px;
			bottom: 6px;
			font-family: 'DM Mono', monospace;
			font-size: 10px;
			color: var(--text-dim);
			opacity: 0.55;
			pointer-events: none;
			user-select: none;
			z-index: 1000;
		}

		#header-nav {
			display: flex;
			align-items: center;
			gap: 4px;
			margin-right: 8px;
		}

		.nav-btn {
			width: 40px;
			height: 40px;
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			color: var(--text-dim);
			border-radius: 8px;
			transition: background 0.15s, color 0.15s;
			background: none;
			border: none;
		}

			.nav-btn:hover, .nav-btn:active {
				background: var(--bg-hover);
				color: var(--text-primary);
			}

			.nav-btn.active {
				color: var(--accent);
				background: var(--accent-dim);
			}

		#logo {
			cursor: pointer;
		}

		#page-overlay {
			display: none;
			flex: 1;
			overflow: hidden;
			background: var(--bg-deep);
		}

			#page-overlay.active {
				display: flex;
			}

		#page-frame {
			flex: 1;
			width: 100%;
			height: 100%;
			border: none;
			background: var(--bg-deep);
		}

		body.page-mode #main-layout {
			display: none;
		}
	</style>
</head>

	<script src="/web/pulse-api.js"></script>
	<script>
		let API_USER = 'Rob';
		let pulse = PulseAPI.create({ user: API_USER, client: 'PulseWeb' });

		/* The pulse_v1 contract is the wire ("object is the wire"): fields are

		   the render/playback code consumes, so only the data layer changed. */
		function normalizeLastPlayed(raw) { if (!raw) { return ''; } if (raw.indexOf('0001-') === 0) { return ''; } return raw; }
		function adaptTrack(track) {
			if (!track) { return null; }
			return { id: track.Id, title: track.Title, artist: track.Artist, artistId: track.ArtistId, album: track.Album, albumId: track.AlbumId, coverArt: track.CoverArt || track.AlbumId || null, duration: track.Duration, starred: track.Starred };
		}
		function adaptTracks(list) { let out = []; if (list) { for (let idx = 0; idx < list.length; idx++) { out.push(adaptTrack(list[idx])); } } return out; }
		function adaptAlbum(album) {
			if (!album) { return null; }
			return { id: album.Id, name: album.Name, artist: album.Artist, artistId: album.ArtistId, coverArt: album.CoverArt || null, year: album.Year, trackCount: album.TrackCount, duration: album.Duration };
		}
		function adaptAlbums(list) { let out = []; if (list) { for (let idx = 0; idx < list.length; idx++) { out.push(adaptAlbum(list[idx])); } } return out; }
		function adaptArtist(artist) {
			if (!artist) { return null; }
			return { id: artist.Id, name: artist.Name, coverArt: artist.CoverArt || null, albumCount: artist.AlbumCount, trackCount: artist.TrackCount, score: artist.Score, lastPlayed: normalizeLastPlayed(artist.LastPlayed) };
		}
		function adaptArtists(list) { let out = []; if (list) { for (let idx = 0; idx < list.length; idx++) { out.push(adaptArtist(list[idx])); } } return out; }
		function adaptPlaylist(playlist) {
			if (!playlist) { return null; }
			return { id: playlist.Id, name: playlist.Name, coverArt: playlist.CoverArt || null, songCount: playlist.TrackCount, duration: playlist.Duration, comment: playlist.Comment || '', score: playlist.Score, lastPlayed: normalizeLastPlayed(playlist.LastPlayed) };
		}
		function adaptPlaylists(list) { let out = []; if (list) { for (let idx = 0; idx < list.length; idx++) { out.push(adaptPlaylist(list[idx])); } } return out; }
		function adaptPodcast(podcast) {
			if (!podcast) { return null; }
			let count = podcast.EpisodeCount; if (count === undefined || count === null) { count = podcast.ItemCount || 0; }
			return { id: podcast.Id, title: podcast.Title, author: podcast.Author || '', coverArt: podcast.CoverArt || null, description: podcast.Description || '', episodeCount: count, unplayedCount: podcast.UnplayedCount || 0, subscribed: !!podcast.Subscribed, feedUrl: podcast.FeedUrl || '', lastPlayed: normalizeLastPlayed(podcast.LastPlayed) };
		}
		function adaptPodcasts(list) { let out = []; if (list) { for (let idx = 0; idx < list.length; idx++) { out.push(adaptPodcast(list[idx])); } } return out; }
		function adaptEpisode(episode) {
			if (!episode) { return null; }
			return { id: episode.Id, seriesId: episode.SeriesId, title: episode.Title, description: episode.Description || '', coverArt: episode.CoverArt || null, duration: episode.Duration || 0, publishedDate: episode.PublishedDate || '', position: episode.PositionSeconds || 0, completed: !!episode.Completed };
		}
		function adaptEpisodes(list) { let out = []; if (list) { for (let idx = 0; idx < list.length; idx++) { out.push(adaptEpisode(list[idx])); } } return out; }
		/* Map an envelope status code onto a user-facing message. */
		function apiErrorMessage(err) { let status = (err && err.status) || ''; if (status === 'name_taken') { return 'A playlist with that name already exists.'; } if (status === 'missing_name') { return 'Please enter a name.'; } return 'Request failed'; }
		function logApiError(label, err) { console.error(label, (err && err.status) || err); }

		function coverArtUrl(artId, size) { return pulse.coverArtUrl(artId, size); }
		function streamUrl(trackId) { return pulse.streamUrl(trackId); }

		let currentView = 'home'; let navStack = []; let searchTimeout = null;
		let cachedArtists = null; let cachedPlaylists = null; let cachedPodcasts = null; let currentPodcastDetail = null;
		let currentAlbumDetail = null; let currentPlaylistDetail = null; let currentArtistId = null;
		let leftTab = 'playlists'; let leftSort = 'alpha';
		let audioElement = new Audio(); let playQueue = []; let playQueueIndex = -1;
		let isShuffled = false; let repeatMode = 0; let progressInterval = null; let menuTrackId = null;
		audioElement.volume = 0.7;
		audioElement.addEventListener('ended', function () { if (repeatMode === 2) { audioElement.currentTime = 0; audioElement.play(); } else { playNext(); } });
		audioElement.addEventListener('play', function () { updatePlayButton(true); startProgressUpdates(); });
		audioElement.addEventListener('pause', function () { updatePlayButton(false); stopProgressUpdates(); });

		function updateClock() {
			let now = new Date();
			let days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
			let months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
			let hours = now.getHours();
			let ampm;
			if (hours >= 12) { ampm = 'PM'; } else { ampm = 'AM'; }
			hours = hours % 12;
			if (hours === 0) { hours = 12; }
			let mins = now.getMinutes();
			let minsPad = '';
			if (mins < 10) { minsPad = '0'; }
			document.getElementById('clock').textContent = hours + ':' + minsPad + mins + ' ' + ampm + '  \u00b7  ' + days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
		}
		setInterval(updateClock, 30000); updateClock();

		function showView(viewName) {
			let views = document.querySelectorAll('.center-view');
			for (let idx = 0; idx < views.length; idx++) { views[idx].classList.remove('active'); }
			let target = document.getElementById('view-' + viewName);
			if (target) { target.classList.add('active'); }
			currentView = viewName;
			let backDisplay;
			if (navStack.length > 0) { backDisplay = 'flex'; } else { backDisplay = 'none'; }
			document.getElementById('back-btn').style.display = backDisplay;
			if (viewName !== 'search') { document.getElementById('search-input').value = ''; }
			if (viewName === 'home') { loadHomeScreen(); }
			document.getElementById('center-panel').scrollTop = 0;
		}
		function navigateWithHistory(viewName) { navStack.push(currentView); showView(viewName); }
		function goBack()
		{
			if (navStack.length === 0) {
				showView('home');
				return;
			}
			showView(navStack.pop());
		}

		function formatDuration(seconds) {
			if (!seconds || isNaN(seconds) || seconds < 0) { seconds = 0; }
			seconds = Math.floor(seconds);
			let hours = Math.floor(seconds / 3600);
			let mins = Math.floor((seconds % 3600) / 60);
			let secs = seconds % 60;
			let secsPad = '';
			if (secs < 10) { secsPad = '0'; }
			if (hours > 0) {
				let minsPad = '';
				if (mins < 10) { minsPad = '0'; }
				return hours + ':' + minsPad + mins + ':' + secsPad + secs;
			}
			return mins + ':' + secsPad + secs;
		}
		function makeArtistInitials(name) { let words = name.split(' '); if (words.length === 1) { return name.substring(0, 2).toUpperCase(); } return (words[0][0] + words[words.length - 1][0]).toUpperCase(); }
		function escapeHtml(text) { if (!text) { return ''; } let div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
		function shuffleArray(arr) { for (let idx = arr.length - 1; idx > 0; idx--) { let swapIdx = Math.floor(Math.random() * (idx + 1)); let temp = arr[idx]; arr[idx] = arr[swapIdx]; arr[swapIdx] = temp; } }
		function artHtml(artId, size) {
			if (artId) {
				return '<img src="' + coverArtUrl(artId, size) + '" loading="lazy" />';
			}
			return '&#9835;';
		}

		function buildTrackRow(song, rowNumber, onClickFn) { let row = document.createElement('div'); row.className = 'track-row'; row.setAttribute('data-track-id', song.id); row.onclick = onClickFn; row.innerHTML = '<span class="track-num">' + rowNumber + '</span><div class="track-title-col"><span class="track-title">' + escapeHtml(song.title) + '</span><span class="track-artist-sub">' + escapeHtml(song.artist) + '</span></div><span class="track-album">' + escapeHtml(song.album || '') + '</span><span class="track-duration">' + formatDuration(song.duration) + '</span><button class="track-menu-btn" data-action="open-track-menu" data-track-id="' + song.id + '"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg></button>'; return row; }
		function buildCarouselCard(artId, name, sub, onClick, round) {
			let card = document.createElement('div');
			card.className = 'carousel-card';
			card.onclick = onClick;
			let roundClass = '';
			if (round) { roundClass = ' round'; }
			let subHtml = '';
			if (sub) { subHtml = '<div class="carousel-card-sub">' + escapeHtml(sub) + '</div>'; }
			card.innerHTML = '<div class="carousel-card-art' + roundClass + '">' + artHtml(artId, 300) + '</div><div class="carousel-card-name">' + escapeHtml(name) + '</div>' + subHtml;
			return card;
		}
		/* Left Panel */
		function switchLeftTab(tab) { leftTab = tab; let tabs = document.querySelectorAll('.left-tab'); for (let idx = 0; idx < tabs.length; idx++) { if (tabs[idx].getAttribute('data-left-tab') === tab) { tabs[idx].classList.add('active'); } else { tabs[idx].classList.remove('active'); } } document.getElementById('left-new-playlist-bar').style.display = (tab === 'playlists') ? 'flex' : 'none'; document.getElementById('left-new-podcast-bar').style.display = (tab === 'podcasts') ? 'flex' : 'none'; if (tab !== 'playlists') { hideNewPlaylistForm(); } if (tab !== 'podcasts') { hideNewPodcastForm(); } renderLeftList(); }
		function setLeftSort(sort) { leftSort = sort; let btns = document.querySelectorAll('.sort-btn'); for (let idx = 0; idx < btns.length; idx++) { btns[idx].classList.remove('active'); if (btns[idx].getAttribute('data-sort') === sort) { btns[idx].classList.add('active'); } } renderLeftList(); }
		function renderLeftList() { let container = document.getElementById('left-list'); container.innerHTML = ''; if (leftTab === 'playlists') { renderLeftPlaylists(container); } else if (leftTab === 'podcasts') { renderLeftPodcasts(container); } else { renderLeftArtists(container); } }
		function renderLeftPodcasts(container) {
			if (!cachedPodcasts) {
				container.innerHTML = '<div class="loading-text">Loading...</div>';
				pulse.podcasts().then(function (list) { cachedPodcasts = adaptPodcasts(list); renderLeftPodcasts(container); }).catch(function (err) { logApiError('podcasts', err); container.innerHTML = '<div class="loading-text">Failed to load</div>'; });
				return;
			}
			let sorted = cachedPodcasts.slice();
			if (leftSort === 'recent') { sorted.sort(function (left, right) { return (right.lastPlayed || '').localeCompare(left.lastPlayed || ''); }); } else { sorted.sort(function (left, right) { return left.title.localeCompare(right.title); }); }
			container.innerHTML = '';
			if (sorted.length === 0) { container.innerHTML = '<div class="loading-text">No podcasts yet. Add one with an RSS URL.</div>'; return; }
			for (let idx = 0; idx < sorted.length; idx++) {
				let podcast = sorted[idx];
				let item = document.createElement('div');
				item.className = 'left-item';
				item.onclick = (function (pid) { return function () { navStack = []; openPodcast(pid); }; })(podcast.id);
				let sub = podcast.episodeCount + ' episodes';
				if (podcast.unplayedCount > 0) { sub = podcast.unplayedCount + ' new · ' + sub; }
				item.innerHTML = '<div class="left-item-art">' + artHtml(podcast.coverArt, 80) + '</div><div class="left-item-text"><div class="left-item-name">' + escapeHtml(podcast.title) + '</div><div class="left-item-sub">' + escapeHtml(sub) + '</div></div>';
				container.appendChild(item);
			}
		}
		function renderLeftPlaylists(container) { if (!cachedPlaylists) { container.innerHTML = '<div class="loading-text">Loading...</div>'; pulse.playlists().then(function (list) { cachedPlaylists = adaptPlaylists(list); renderLeftPlaylists(container); }).catch(function (err) { logApiError('playlists', err); container.innerHTML = '<div class="loading-text">Failed to load</div>'; }); return; } let sorted = cachedPlaylists.slice(); if (leftSort === 'alpha') { sorted.sort(function (left, right) { return left.name.localeCompare(right.name); }); } else if (leftSort === 'popular') { sorted.sort(function (left, right) { return (right.score || 0) - (left.score || 0); }); } else if (leftSort === 'recent') { sorted.sort(function (left, right) { return (right.lastPlayed || '').localeCompare(left.lastPlayed || ''); }); } container.innerHTML = ''; for (let idx = 0; idx < sorted.length; idx++) { let playlist = sorted[idx]; let item = document.createElement('div'); item.className = 'left-item'; item.onclick = (function (pid) { return function () { navStack = []; openPlaylist(pid); }; })(playlist.id); item.innerHTML = '<div class="left-item-art">' + artHtml(playlist.coverArt, 80) + '</div><div class="left-item-text"><div class="left-item-name">' + escapeHtml(playlist.name) + '</div><div class="left-item-sub">' + playlist.songCount + ' tracks</div></div>'; container.appendChild(item); } }
		function renderLeftArtists(container) { if (!cachedArtists) { container.innerHTML = '<div class="loading-text">Loading...</div>'; pulse.artists().then(function (list) { cachedArtists = adaptArtists(list); renderLeftArtists(container); }).catch(function (err) { logApiError('artists', err); container.innerHTML = '<div class="loading-text">Failed to load</div>'; }); return; } let sorted = cachedArtists.slice(); if (leftSort === 'alpha') { sorted.sort(function (left, right) { return left.name.localeCompare(right.name); }); } else if (leftSort === 'popular') { sorted.sort(function (left, right) { return (right.score || 0) - (left.score || 0); }); } else if (leftSort === 'recent') { sorted.sort(function (left, right) { return (right.lastPlayed || '').localeCompare(left.lastPlayed || ''); }); } container.innerHTML = ''; for (let idx = 0; idx < sorted.length; idx++) { let artist = sorted[idx]; let avatarHtml;
				if (artist.coverArt) { avatarHtml = '<img src="' + coverArtUrl(artist.coverArt, 80) + '" style="border-radius:50%;" />'; }
				else { avatarHtml = makeArtistInitials(artist.name); } let item = document.createElement('div'); item.className = 'left-item'; item.onclick = (function (aid) { return function () { navStack = []; openArtist(aid); }; })(artist.id); item.innerHTML = '<div class="left-item-art round">' + avatarHtml + '</div><div class="left-item-text"><div class="left-item-name">' + escapeHtml(artist.name) + '</div><div class="left-item-sub">' + artist.albumCount + ' albums</div></div>'; container.appendChild(item); } }

		/* Home */
		function loadHomeScreen() { loadQuickGrid(); loadRecentCarousel(); loadPlaylistCarousel(); loadPopularArtistsCarousel(); }
		function loadQuickGrid() {
			let grid = document.getElementById('home-quick-grid');
			grid.innerHTML = ''; pulse.playlists().then(
				function (list)
				{
					let playlists = adaptPlaylists(list);
					let limit = Math.min(8, playlists.length);
					for (let idx = 0; idx < limit; idx++)
					{
						(function (playlist)
						{
							let item = document.createElement('div');
							item.className = 'quick-item';
							item.onclick = function ()
							{
								navStack = []; openPlaylist(playlist.id);
							};
							let playBtn = '<button class="quick-item-play" data-action="quick-play-playlist" data-playlist-id="' + playlist.id + '" title="Play"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>';

							item.innerHTML = '<div class="quick-item-art">' + artHtml(playlist.coverArt, 112) + '</div><div class="quick-item-name">' + escapeHtml(playlist.name) + '</div>' + playBtn;
							grid.appendChild(item);
						})(playlists[idx]);
					}
				});
		}
		function quickPlayPlaylist(playlistId) {
			pulse.playlist(playlistId).then(function (details) {
				let songs = adaptTracks(details && details.Tracks);
				if (songs.length > 0) {
					markPlaylistPlayed(playlistId);
					playTrackList(songs, 0);
				}
			}).catch(function (err) { logApiError('playlist', err); });

		/* Mixed-kind recents: each item is a concrete Pulse* object tagged with
		   Kind. Tracks play in place; the rest navigate to their detail view. */
		function loadRecentCarousel()

		function addTrackToPlaylist(playlistId) { document.getElementById('playlist-picker').style.display = 'none'; if (!menuTrackId) { return; } pulse.updatePlaylist({ playlistId: playlistId, songIdsToAdd: [menuTrackId] }).then(function () { menuTrackId = null; }).catch(function (err) { logApiError('updatePlaylist', err); }); }
		function removeFromPlaylist() { document.getElementById('track-menu').style.display = 'none'; if (!menuTrackId || !currentPlaylistDetail) { return; } let songs = currentPlaylistDetail.entry || []; let removeIndex = -1; for (let idx = 0; idx < songs.length; idx++) { if (songs[idx].id === menuTrackId) { removeIndex = idx; break; } } if (removeIndex < 0) { return; } pulse.updatePlaylist({ playlistId: currentPlaylistDetail.id, songIndexesToRemove: [removeIndex] }).then(function () { openPlaylist(currentPlaylistDetail.id); menuTrackId = null; }).catch(function (err) { logApiError('updatePlaylist', err); }); }

		/* Returns true if any existing playlist matches name case-insensitively (optionally skipping a given id). */
		function playlistNameExists(name, skipId) {
			let lower = name.toLowerCase();
			let list = cachedPlaylists || [];
			for (let idx = 0; idx < list.length; idx++) {
				if (skipId && list[idx].id === skipId) { continue; }
				if ((list[idx].name || '').toLowerCase() === lower) { return true; }
			}
			return false;
		}

		/* Left-rail create playlist */
		function showNewPlaylistForm() {
			document.getElementById('left-new-playlist-form').style.display = 'block';
			document.getElementById('new-playlist-error').textContent = '';
			let input = document.getElementById('new-playlist-name');
			input.value = '';
			input.focus();
		}
		function hideNewPlaylistForm() {
			document.getElementById('left-new-playlist-form').style.display = 'none';
		}
		function createNewPlaylist() {
			let name = document.getElementById('new-playlist-name').value.trim();
			let errEl = document.getElementById('new-playlist-error');
			errEl.textContent = '';
			if (!name) { return; }
			if (playlistNameExists(name, null)) { errEl.textContent = 'A playlist with that name already exists.'; return; }
			pulse.createPlaylist({ name: name }).then(function () {
				hideNewPlaylistForm();
				cachedPlaylists = null;
				if (leftTab !== 'playlists') { switchLeftTab('playlists'); } else { renderLeftList(); }
			}).catch(function (err) { errEl.textContent = apiErrorMessage(err); });
		}
		function showNewPodcastForm() {
			document.getElementById('left-new-podcast-form').style.display = 'block';
			document.getElementById('new-podcast-error').textContent = '';
			let input = document.getElementById('new-podcast-url');
			input.value = '';
			input.focus();
		}
		function hideNewPodcastForm() {
			document.getElementById('left-new-podcast-form').style.display = 'none';
		}
		function createNewPodcast() {
			let url = document.getElementById('new-podcast-url').value.trim();
			let errEl = document.getElementById('new-podcast-error');
			errEl.textContent = '';
			if (!url) { errEl.textContent = 'Please enter an RSS feed URL.'; return; }
			errEl.textContent = 'Adding…';
			pulse.addPodcast(url, true).then(function () {
				hideNewPodcastForm();
				cachedPodcasts = null;
				if (leftTab !== 'podcasts') { switchLeftTab('podcasts'); } else { renderLeftList(); }
			}).catch(function (err) { logApiError('addPodcast', err); errEl.textContent = 'Could not add that feed.'; });
		}

		/* Playlist detail menu (rename / edit description / delete) */
		function openPlaylistMenu(event, buttonEl) {
			event.stopPropagation();
			if (!currentPlaylistDetail) { return; }
			let menu = document.getElementById('playlist-menu');
			let rect = buttonEl.getBoundingClientRect();
			menu.style.display = 'block';
			menu.style.top = rect.bottom + 'px';
			menu.style.right = (window.innerWidth - rect.right) + 'px';
			menu.style.left = 'auto';
		}
		function startPlaylistRename() {
			document.getElementById('playlist-menu').style.display = 'none';
			if (!currentPlaylistDetail) { return; }
			document.getElementById('playlist-comment-form').style.display = 'none';
			let form = document.getElementById('playlist-rename-form');
			document.getElementById('playlist-rename-error').textContent = '';
			let input = document.getElementById('playlist-rename-input');
			input.value = currentPlaylistDetail.name || '';
			form.style.display = 'block';
			input.focus();
			input.select();
		}
		function cancelPlaylistRename() {
			document.getElementById('playlist-rename-form').style.display = 'none';
		}
		function commitPlaylistRename() {
			if (!currentPlaylistDetail) { return; }
			let name = document.getElementById('playlist-rename-input').value.trim();
			let errEl = document.getElementById('playlist-rename-error');
			errEl.textContent = '';
			if (!name) { return; }
			if (playlistNameExists(name, currentPlaylistDetail.id)) { errEl.textContent = 'A playlist with that name already exists.'; return; }
			pulse.updatePlaylist({ playlistId: currentPlaylistDetail.id, name: name }).then(function () {
				cancelPlaylistRename();
				cachedPlaylists = null;
				let pid = currentPlaylistDetail.id;
				openPlaylist(pid);
				renderLeftList();
			}).catch(function (err) { errEl.textContent = apiErrorMessage(err); });
		}
		function startPlaylistComment() {
			document.getElementById('playlist-menu').style.display = 'none';
			if (!currentPlaylistDetail) { return; }
			document.getElementById('playlist-rename-form').style.display = 'none';
			let form = document.getElementById('playlist-comment-form');
			let input = document.getElementById('playlist-comment-input');
			input.value = currentPlaylistDetail.comment || '';
			form.style.display = 'block';
			input.focus();
		}
		function cancelPlaylistComment() {
			document.getElementById('playlist-comment-form').style.display = 'none';
		}
		function commitPlaylistComment() {
			if (!currentPlaylistDetail) { return; }
			let comment = document.getElementById('playlist-comment-input').value;
			pulse.updatePlaylist({ playlistId: currentPlaylistDetail.id, comment: comment }).then(function () {
				cancelPlaylistComment();
				let pid = currentPlaylistDetail.id;
				openPlaylist(pid);
			}).catch(function (err) { logApiError('updatePlaylist', err); });
		}
		function confirmDeletePlaylist() {
			document.getElementById('playlist-menu').style.display = 'none';
			if (!currentPlaylistDetail) { return; }
			let name = currentPlaylistDetail.name || '(unnamed)';
			showConfirm('Delete playlist "' + name + '"? Tracks themselves are not affected.', 'Delete', function () {
				pulse.deletePlaylist(currentPlaylistDetail.id).then(function () {
					currentPlaylistDetail = null;
					cachedPlaylists = null;
					renderLeftList();
					showView('home');
				}).catch(function (err) { logApiError('deletePlaylist', err); });
			});
		}

		/* Generic confirm dialog */
		let pendingConfirmAction = null;
		function showConfirm(message, okLabel, onConfirm) {
			document.getElementById('confirm-message').textContent = message;
			let btn = document.getElementById('confirm-ok-btn');
			btn.textContent = okLabel || 'OK';
			pendingConfirmAction = onConfirm;
			let dlg = document.getElementById('confirm-dialog');
			dlg.style.display = 'block';
			dlg.style.top = (window.innerHeight / 2 - dlg.offsetHeight / 2) + 'px';
			dlg.style.left = (window.innerWidth / 2 - dlg.offsetWidth / 2) + 'px';
		}
		function runPendingConfirm() {
			let action = pendingConfirmAction;
			pendingConfirmAction = null;
			document.getElementById('confirm-dialog').style.display = 'none';
			if (action) { action(); }
		}
		function cancelConfirm() {
			pendingConfirmAction = null;
			document.getElementById('confirm-dialog').style.display = 'none';
		}

		document.addEventListener('click', function (event) {
			if (event.target.closest('#confirm-dialog')) { return; }
			if (event.target.closest('#playlist-menu')) { return; }
			if (event.target.closest('#playlist-picker')) { return; }
			if (event.target.closest('#left-new-playlist-form')) { return; }
			if (event.target.closest('[data-action="show-new-playlist-form"]')) { return; }
			if (event.target.closest('[data-action="open-playlist-menu"]')) { return; }
			document.getElementById('track-menu').style.display = 'none';
			document.getElementById('playlist-picker').style.display = 'none';
			document.getElementById('playlist-menu').style.display = 'none';
		});

		/* Playback */
		function playTrackList(songs, startIndex) { playQueue = songs.slice(); playQueueIndex = startIndex; playCurrentTrack(); }
		function playCurrentTrack() { if (playQueueIndex < 0 || playQueueIndex >= playQueue.length) { return; } let song = playQueue[playQueueIndex]; audioElement.src = streamUrl(song.id); audioElement.play(); document.getElementById('player-title').textContent = song.title; document.getElementById('player-artist-name').textContent = song.artist; document.getElementById('player-time-total').textContent = formatDuration(song.duration); document.getElementById('player-time-current').textContent = '0:00'; document.getElementById('player-progress-fill').style.width = '0%'; document.getElementById('player-art').innerHTML = artHtml(song.coverArt, 104); document.getElementById('np-empty').style.display = 'none'; document.getElementById('np-content').style.display = 'block'; document.getElementById('np-art').innerHTML = artHtml(song.coverArt, 520); document.getElementById('np-title').textContent = song.title; document.getElementById('np-artist').textContent = song.artist; document.getElementById('np-album').textContent = song.album || ''; updateNextTrack(); highlightPlayingTrack(song.id); }
		function updateNextTrack() { let nextIdx = playQueueIndex + 1; if (nextIdx < playQueue.length) { let next = playQueue[nextIdx]; document.getElementById('np-next-label').style.display = 'block'; document.getElementById('np-next-item').style.display = 'flex'; document.getElementById('np-next-art').innerHTML = artHtml(next.coverArt, 88); document.getElementById('np-next-title').textContent = next.title; document.getElementById('np-next-artist').textContent = next.artist; } else { document.getElementById('np-next-label').style.display = 'none'; document.getElementById('np-next-item').style.display = 'none'; } }
		function highlightPlayingTrack(trackId) { let allRows = document.querySelectorAll('.track-row'); for (let idx = 0; idx < allRows.length; idx++) { allRows[idx].classList.remove('playing'); if (allRows[idx].getAttribute('data-track-id') === trackId) { allRows[idx].classList.add('playing'); } } }
		function togglePlayPause() { if (audioElement.src === '') { return; } if (audioElement.paused) { audioElement.play(); } else { audioElement.pause(); } }
		function updatePlayButton(isPlaying) {
			let playDisplay;
			let pauseDisplay;
			if (isPlaying) { playDisplay = 'none'; pauseDisplay = 'block'; }
			else { playDisplay = 'block'; pauseDisplay = 'none'; }
			document.getElementById('play-icon').style.display = playDisplay;
			document.getElementById('pause-icon').style.display = pauseDisplay;
		}
		function playNext() { if (playQueue.length === 0) { return; } playQueueIndex = playQueueIndex + 1; if (playQueueIndex >= playQueue.length) { if (repeatMode === 1) { playQueueIndex = 0; } else { playQueueIndex = playQueue.length - 1; audioElement.pause(); return; } } playCurrentTrack(); }
		function playPrevious() { if (playQueue.length === 0) { return; } if (audioElement.currentTime > 3) { audioElement.currentTime = 0; return; } playQueueIndex = playQueueIndex - 1; if (playQueueIndex < 0) { if (repeatMode === 1) { playQueueIndex = playQueue.length - 1; } else { playQueueIndex = 0; } } playCurrentTrack(); }
		function toggleShuffle() { isShuffled = !isShuffled; let btn = document.getElementById('btn-shuffle'); if (isShuffled) { btn.classList.add('active'); if (playQueue.length > 1 && playQueueIndex >= 0) { let remaining = playQueue.slice(playQueueIndex + 1); shuffleArray(remaining); playQueue = playQueue.slice(0, playQueueIndex + 1).concat(remaining); } } else { btn.classList.remove('active'); } }
		function toggleRepeat() { repeatMode = (repeatMode + 1) % 3; let btn = document.getElementById('btn-repeat'); if (repeatMode === 0) { btn.classList.remove('active'); } else { btn.classList.add('active'); } }
		function startProgressUpdates() { stopProgressUpdates(); progressInterval = setInterval(updateProgress, 500); }
		function stopProgressUpdates() { if (progressInterval) { clearInterval(progressInterval); progressInterval = null; } }
		function updateProgress() { if (audioElement.duration && !isNaN(audioElement.duration)) { let current = Math.floor(audioElement.currentTime); let pct = (audioElement.currentTime / audioElement.duration) * 100; document.getElementById('player-time-current').textContent = formatDuration(current); document.getElementById('player-progress-fill').style.width = pct + '%'; } }
		function seekTo(event) { let bar = document.getElementById('player-progress-bar'); let rect = bar.getBoundingClientRect(); let pct = (event.clientX - rect.left) / rect.width; if (pct < 0) { pct = 0; } if (pct > 1) { pct = 1; } if (audioElement.duration && !isNaN(audioElement.duration)) { audioElement.currentTime = pct * audioElement.duration; updateProgress(); } }
		function setVolume(event) { let bar = document.getElementById('volume-slider'); let rect = bar.getBoundingClientRect(); let pct = (event.clientX - rect.left) / rect.width; if (pct < 0) { pct = 0; } if (pct > 1) { pct = 1; } audioElement.volume = pct; document.getElementById('volume-fill').style.width = (pct * 100) + '%'; }

		/* Init */
		function wireUpStaticHandlers() {
			document.getElementById('back-btn').addEventListener('click', goBack);
			document.getElementById('search-input').addEventListener('input', function (event) { onSearchInput(event.target.value); });
			document.getElementById('album-detail-artist').addEventListener('click', onAlbumArtistClick);
			document.getElementById('album-play-btn').addEventListener('click', playAlbum);
			document.getElementById('album-shuffle-btn').addEventListener('click', shuffleAlbum);
			document.getElementById('artist-play-btn').addEventListener('click', playArtist);
			document.getElementById('artist-shuffle-btn').addEventListener('click', shuffleArtist);
			document.getElementById('playlist-play-btn').addEventListener('click', playPlaylist);
			document.getElementById('playlist-shuffle-btn').addEventListener('click', shufflePlaylist);
			document.getElementById('podcast-play-btn').addEventListener('click', playPodcastLatest);
			document.getElementById('podcast-subscribe-btn').addEventListener('click', togglePodcastSubscription);
			document.getElementById('np-next-item').addEventListener('click', playNext);
			document.getElementById('btn-shuffle').addEventListener('click', toggleShuffle);
			document.getElementById('btn-previous').addEventListener('click', playPrevious);
			document.getElementById('btn-play').addEventListener('click', togglePlayPause);
			document.getElementById('btn-next').addEventListener('click', playNext);
			document.getElementById('btn-repeat').addEventListener('click', toggleRepeat);
			document.getElementById('player-progress-bar').addEventListener('click', seekTo);
			document.getElementById('volume-slider').addEventListener('click', setVolume);
			document.querySelector('.menu-item-add').addEventListener('click', showPlaylistPicker);
			document.querySelector('.menu-item-remove').addEventListener('click', removeFromPlaylist);
			document.getElementById('confirm-ok-btn').addEventListener('click', runPendingConfirm);
			document.getElementById('new-playlist-name').addEventListener('keydown', function (event) { if (event.key === 'Enter') { createNewPlaylist(); } else if (event.key === 'Escape') { hideNewPlaylistForm(); } });
			document.getElementById('new-podcast-url').addEventListener('keydown', function (event) { if (event.key === 'Enter') { createNewPodcast(); } else if (event.key === 'Escape') { hideNewPodcastForm(); } });
			document.getElementById('picker-new-name').addEventListener('keydown', function (event) { if (event.key === 'Enter') { createPlaylistFromPicker(); } else if (event.key === 'Escape') { cancelPickerNewForm(); } });
			document.getElementById('playlist-rename-input').addEventListener('keydown', function (event) { if (event.key === 'Enter') { commitPlaylistRename(); } else if (event.key === 'Escape') { cancelPlaylistRename(); } });
			let leftTabButtons = document.querySelectorAll('.left-tab');
			for (let idx = 0; idx < leftTabButtons.length; idx++) {
				let button = leftTabButtons[idx];
				button.addEventListener('click', function () { switchLeftTab(button.getAttribute('data-left-tab')); });
			}
			document.getElementById('left-new-playlist-bar').style.display = (leftTab === 'playlists') ? 'flex' : 'none';
			let sortButtons = document.querySelectorAll('.sort-btn');
			for (let idx = 0; idx < sortButtons.length; idx++) {
				let button = sortButtons[idx];
				button.addEventListener('click', function () { setLeftSort(button.getAttribute('data-sort')); });
			}
		}
		function handleDelegatedClick(event) {
			let target = event.target.closest('[data-action]');
			if (!target) { return; }
			let action = target.getAttribute('data-action');
			if (action === 'open-track-menu') {
				openTrackMenu(event, target, target.getAttribute('data-track-id'));
			}
			else if (action === 'quick-play-playlist') {
				event.stopPropagation();
				quickPlayPlaylist(target.getAttribute('data-playlist-id'));
			}
			else if (action === 'open-playlist-menu') { openPlaylistMenu(event, target); }
			else if (action === 'show-new-playlist-form') { event.stopPropagation(); showNewPlaylistForm(); }
			else if (action === 'hide-new-playlist-form') { hideNewPlaylistForm(); }
			else if (action === 'create-new-playlist') { createNewPlaylist(); }
			else if (action === 'show-new-podcast-form') { event.stopPropagation(); showNewPodcastForm(); }
			else if (action === 'hide-new-podcast-form') { hideNewPodcastForm(); }
			else if (action === 'create-new-podcast') { createNewPodcast(); }
			else if (action === 'show-picker-new-form') { event.stopPropagation(); showPickerNewForm(); }
			else if (action === 'cancel-picker-new-form') { event.stopPropagation(); cancelPickerNewForm(); }
			else if (action === 'create-playlist-from-picker') { event.stopPropagation(); createPlaylistFromPicker(); }
			else if (action === 'playlist-menu-rename') { startPlaylistRename(); }
			else if (action === 'playlist-menu-comment') { startPlaylistComment(); }
			else if (action === 'playlist-menu-delete') { confirmDeletePlaylist(); }
			else if (action === 'commit-playlist-rename') { commitPlaylistRename(); }
			else if (action === 'cancel-playlist-rename') { cancelPlaylistRename(); }
			else if (action === 'commit-playlist-comment') { commitPlaylistComment(); }
			else if (action === 'cancel-playlist-comment') { cancelPlaylistComment(); }
			else if (action === 'confirm-cancel') { cancelConfirm(); }
		}
		let currentPage = 'pulse';
		function routeTo(pageName, userParam, replace) {
			let overlay = document.getElementById('page-overlay');
			let frame = document.getElementById('page-frame');
			let navStats = document.getElementById('nav-stats');
			let navSettings = document.getElementById('nav-settings');
			navStats.classList.remove('active');
			navSettings.classList.remove('active');
			let url;
			let frameSrc;
			if (pageName === 'pulse') {
				document.body.classList.remove('page-mode');
				overlay.classList.remove('active');
				frame.src = 'about:blank';
				url = '/web/pulse.html';
			} else if (pageName === 'settings') {
				document.body.classList.add('page-mode');
				overlay.classList.add('active');
				frameSrc = '/web/settings.html?embed=1';
				if (frame.src.indexOf('/web/settings.html') === -1) { frame.src = frameSrc; }
				navSettings.classList.add('active');
				url = '/web/pulse.html?view=settings';
			} else if (pageName === 'stats') {
				document.body.classList.add('page-mode');
				overlay.classList.add('active');
				frameSrc = '/web/stats.html?embed=1';
				if (userParam) { frameSrc = frameSrc + '&u=' + encodeURIComponent(userParam); }
				if (frame.src.indexOf('/web/stats.html') === -1) { frame.src = frameSrc; }
				navStats.classList.add('active');
				url = '/web/pulse.html?view=stats';
				if (userParam) { url = url + '&u=' + encodeURIComponent(userParam); }
			} else {
				return;
			}
			currentPage = pageName;
			if (replace) { history.replaceState({ page: pageName, u: userParam || '' }, '', url); }
			else { history.pushState({ page: pageName, u: userParam || '' }, '', url); }
		}
		function readPageFromUrl() {
			let params = new URLSearchParams(window.location.search);
			let view = params.get('view');
			let user = params.get('u') || '';
			if (view === 'settings') { return { page: 'settings', u: '' }; }
			if (view === 'stats') { return { page: 'stats', u: user }; }
			return { page: 'pulse', u: '' };
		}
		function onNavStats() { routeTo('stats', '', false); }
		function onNavSettings() { routeTo('settings', '', false); }
		function onNavPulse() { routeTo('pulse', '', false); }
		function onPopState(event) {
			let state = event.state;
			let page;
			let user = '';
			if (state && state.page) { page = state.page; user = state.u || ''; }
			else { let parsed = readPageFromUrl(); page = parsed.page; user = parsed.u; }
			let overlay = document.getElementById('page-overlay');
			let frame = document.getElementById('page-frame');
			let navStats = document.getElementById('nav-stats');
			let navSettings = document.getElementById('nav-settings');
			navStats.classList.remove('active');
			navSettings.classList.remove('active');
			if (page === 'pulse') {
				document.body.classList.remove('page-mode');
				overlay.classList.remove('active');
				frame.src = 'about:blank';
			} else if (page === 'settings') {
				document.body.classList.add('page-mode');
				overlay.classList.add('active');
				if (frame.src.indexOf('/web/settings.html') === -1) { frame.src = '/web/settings.html?embed=1'; }
				navSettings.classList.add('active');
			} else if (page === 'stats') {
				document.body.classList.add('page-mode');
				overlay.classList.add('active');
				let src = '/web/stats.html?embed=1';
				if (user) { src = src + '&u=' + encodeURIComponent(user); }
				if (frame.src.indexOf('/web/stats.html') === -1) { frame.src = src; }
				navStats.classList.add('active');
			}
			currentPage = page;
		}
		/* Build/assembly version, not the API contract version — served by the
		   dedicated /pulse/version endpoint (Flatline #229). No pulse_v1 equivalent. */
		function loadVersionTag() {
			fetch('/pulse/version').then(function (response) {
				if (!response.ok) { return null; }
				return response.json();
			}).then(function (data) {
				if (!data || !data.version) { return; }
				let tagEl = document.getElementById('pulse-version-tag');
				if (tagEl) { tagEl.textContent = 'v' + data.version; }
			}).catch(function (err) { logApiError('version', err); });
		}
		document.addEventListener('DOMContentLoaded', function () {
			wireUpStaticHandlers();
			document.body.addEventListener('click', handleDelegatedClick);
			showView('home');
			renderLeftList();
			loadVersionTag();
			document.getElementById('nav-stats').addEventListener('click', onNavStats);
			document.getElementById('nav-settings').addEventListener('click', onNavSettings);
			document.getElementById('logo').addEventListener('click', onNavPulse);
			window.addEventListener('popstate', onPopState);
			let initial = readPageFromUrl();
			routeTo(initial.page, initial.u, true);
		});
	</script>
	<div id="pulse-version-tag" class="version-tag"></div>
