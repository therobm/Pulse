<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Pulse</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
	<style>
		:root {
			--bg-deep: #0a0a0c;
			--bg-surface: #121215;
			--bg-raised: #1a1a1f;
			--bg-hover: #222228;
			--bg-active: #2a2a32;
			--border: #2a2a32;
			--border-subtle: #1e1e24;
			--text-primary: #e8e8ec;
			--text-secondary: #8888a0;
			--text-dim: #555568;
			--accent: #3b82f6;
			--accent-dim: #3b82f620;
			--accent-hover: #60a5fa;
			--danger: #b83030;
			--scrollbar-thumb: #2a2a32;
			--scrollbar-track: transparent;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			-webkit-tap-highlight-color: transparent;
		}

		body {
			background: var(--bg-deep);
			color: var(--text-primary);
			font-family: 'DM Sans', sans-serif;
			font-weight: 400;
			font-size: 16px;
			overflow: hidden;
			width: 100vw;
			height: 100vh;
			display: flex;
			flex-direction: column;
			touch-action: manipulation;
		}

		::-webkit-scrollbar {
			width: 6px;
			height: 6px;
		}

		::-webkit-scrollbar-track {
			background: var(--scrollbar-track);
		}

		::-webkit-scrollbar-thumb {
			background: var(--scrollbar-thumb);
			border-radius: 3px;
		}

		/* HEADER */
		#header {
			height: 64px;
			min-height: 64px;
			background: var(--bg-surface);
			border-bottom: 1px solid var(--border-subtle);
			display: flex;
			align-items: center;
			padding: 0 24px;
			gap: 20px;
			z-index: 10;
		}

		#header-left {
			display: flex;
			align-items: center;
			gap: 16px;
		}

		#logo {
			height: 55px;
			width: auto;
		}

		#home-btn, #back-btn {
			width: 48px;
			height: 48px;
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			color: var(--text-dim);
			border-radius: 8px;
			transition: background 0.15s, color 0.15s;
			background: none;
			border: none;
		}

		#back-btn {
			display: none;
		}

			#home-btn:hover, #home-btn:active, #back-btn:hover, #back-btn:active {
				background: var(--bg-hover);
				color: var(--text-primary);
			}

		#header-center {
			flex: 1;
			display: flex;
			justify-content: center;
		}

		#search-container {
			position: relative;
			width: 400px;
			max-width: 100%;
		}

		#search-input {
			width: 100%;
			padding: 10px 14px 10px 40px;
			background: var(--bg-raised);
			border: 1px solid var(--border);
			border-radius: 8px;
			color: var(--text-primary);
			font-family: 'DM Sans', sans-serif;
			font-size: 14px;
			outline: none;
			transition: border-color 0.15s;
		}

			#search-input::placeholder {
				color: var(--text-dim);
			}

			#search-input:focus {
				border-color: var(--accent);
			}

		#search-icon {
			position: absolute;
			left: 12px;
			top: 50%;
			transform: translateY(-50%);
			color: var(--text-dim);
			pointer-events: none;
		}

		#header-right {
			display: flex;
			align-items: center;
			gap: 8px;
			color: var(--text-secondary);
			font-family: 'DM Mono', monospace;
			font-size: 24px;
			min-width: 180px;
			justify-content: flex-end;
		}

		/* MAIN 3-PANEL */
		#main-layout {
			flex: 1;
			display: flex;
			overflow: hidden;
		}

		/* Left Panel */
		#left-panel {
			width: 280px;
			min-width: 280px;
			background: var(--bg-surface);
			border-right: 1px solid var(--border-subtle);
			display: flex;
			flex-direction: column;
			user-select: none;
		}

		#left-tabs {
			display: flex;
			padding: 12px 12px 0 12px;
			gap: 4px;
		}

		.left-tab {
			flex: 1;
			padding: 10px 0;
			text-align: center;
			font-size: 13px;
			font-weight: 500;
			color: var(--text-dim);
			cursor: pointer;
			border-radius: 8px;
			transition: background 0.15s, color 0.15s;
			border: none;
			background: none;
			min-height: 44px;
		}

			.left-tab:hover, .left-tab:active {
				background: var(--bg-hover);
				color: var(--text-primary);
			}

			.left-tab.active {
				background: var(--accent-dim);
				color: var(--accent);
			}

		#left-sort {
			display: flex;
			padding: 8px 12px;
			gap: 4px;
		}

		.sort-btn {
			padding: 6px 10px;
			font-size: 11px;
			font-weight: 500;
			color: var(--text-dim);
			cursor: pointer;
			border-radius: 6px;
			border: none;
			background: none;
			transition: background 0.15s, color 0.15s;
			letter-spacing: 0.03em;
			min-height: 32px;
		}

			.sort-btn:hover, .sort-btn:active {
				background: var(--bg-hover);
				color: var(--text-primary);
			}

			.sort-btn.active {
				color: var(--accent);
			}

		#left-list {
			flex: 1;
			overflow-y: auto;
			padding: 0 8px 12px 8px;
		}

		.left-item {
			display: flex;
			align-items: center;
			gap: 12px;
			padding: 10px 12px;
			border-radius: 8px;
			cursor: pointer;
			transition: background 0.15s;
			min-height: 52px;
		}

			.left-item:hover, .left-item:active {
				background: var(--bg-hover);
			}

			.left-item.active {
				background: var(--accent-dim);
			}

		.left-item-art {
			width: 40px;
			height: 40px;
			border-radius: 6px;
			background: var(--bg-raised);
			flex-shrink: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-dim);
			font-size: 14px;
			overflow: hidden;
		}

			.left-item-art.round {
				border-radius: 50%;
			}

			.left-item-art img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

		.left-item-text {
			min-width: 0;
			flex: 1;
		}

		.left-item-name {
			font-size: 14px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.left-item-sub {
			font-size: 12px;
			color: var(--text-dim);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		/* Center Panel */
		#center-panel {
			flex: 1;
			overflow-y: auto;
			padding: 20px 24px;
			display: flex;
			flex-direction: column;
			gap: 32px;
		}

		.center-view {
			display: none;
		}

			.center-view.active {
				display: block;
			}

		.quick-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 8px;
		}

		.quick-item {
			display: flex;
			align-items: center;
			gap: 12px;
			padding: 0;
			background: var(--bg-raised);
			border-radius: 8px;
			cursor: pointer;
			transition: background 0.15s;
			overflow: hidden;
			min-height: 56px;
		}

		.quick-item:hover, .quick-item:active {
			background: var(--bg-hover);
		}
		.quick-item-play {
			width: 36px;
			height: 36px;
			flex-shrink: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			border: none;
			border-radius: 50%;
			background: var(--text-primary);
			color: var(--bg-deep);
			cursor: pointer;
			transition: transform 0.1s;
			margin-right: 10px;
			margin-left: auto;
		}

		.quick-item-play:hover, .quick-item-play:active {
			transform: scale(1.06);
		}
		.quick-item-art {
			width: 56px;
			height: 56px;
			background: var(--bg-active);
			flex-shrink: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-dim);
			font-size: 18px;
			overflow: hidden;
		}

			.quick-item-art img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

		.quick-item-name {
			font-size: 14px;
			font-weight: 500;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			padding-right: 12px;
		}

		.carousel-header {
			font-size: 18px;
			font-weight: 500;
			margin-bottom: 14px;
		}

		.carousel-scroll {
			display: flex;
			gap: 16px;
			overflow-x: auto;
			padding-bottom: 8px;
			scroll-snap-type: x mandatory;
		}

		.carousel-card {
			flex-shrink: 0;
			width: 160px;
			cursor: pointer;
			scroll-snap-align: start;
			transition: transform 0.15s;
		}

			.carousel-card:active {
				transform: scale(0.97);
			}

		.carousel-card-art {
			width: 160px;
			height: 160px;
			background: var(--bg-raised);
			border-radius: 8px;
			margin-bottom: 8px;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-dim);
			font-size: 32px;
			overflow: hidden;
		}

			.carousel-card-art.round {
				border-radius: 50%;
			}

			.carousel-card-art img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

		.carousel-card-name {
			font-size: 14px;
			font-weight: 500;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.carousel-card-sub {
			font-size: 12px;
			color: var(--text-secondary);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			margin-top: 2px;
		}

		/* Detail views */
		.detail-header {
			display: flex;
			align-items: flex-end;
			gap: 24px;
			margin-bottom: 28px;
		}

		.detail-art {
			width: 180px;
			height: 180px;
			background: var(--bg-raised);
			border-radius: 8px;
			flex-shrink: 0;
			overflow: hidden;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-dim);
			font-size: 48px;
		}

			.detail-art img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

		.detail-info {
			display: flex;
			flex-direction: column;
			gap: 4px;
		}

		.detail-label {
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.1em;
			text-transform: uppercase;
			color: var(--text-dim);
		}

		.detail-name {
			font-size: 28px;
			font-weight: 300;
		}

		.detail-sub {
			font-size: 15px;
			color: var(--text-secondary);
			cursor: pointer;
			transition: color 0.15s;
		}

			.detail-sub:hover {
				color: var(--text-primary);
			}

		.detail-meta {
			font-size: 13px;
			color: var(--text-dim);
			margin-top: 4px;
		}

		.detail-actions {
			display: flex;
			gap: 10px;
			margin-top: 12px;
		}

		.btn {
			padding: 10px 20px;
			border-radius: 8px;
			font-family: 'DM Sans', sans-serif;
			font-size: 14px;
			font-weight: 500;
			cursor: pointer;
			border: none;
			transition: background 0.15s;
			min-height: 44px;
		}

		.btn-primary {
			background: var(--accent);
			color: #fff;
		}

			.btn-primary:hover, .btn-primary:active {
				background: var(--accent-hover);
			}

		.btn-ghost {
			background: transparent;
			color: var(--text-secondary);
			border: 1px solid var(--border);
		}

			.btn-ghost:hover, .btn-ghost:active {
				background: var(--bg-hover);
				color: var(--text-primary);
			}

		.track-list-header {
			display: grid;
			grid-template-columns: 40px 1fr 1fr 64px 44px;
			padding: 0 12px 8px 12px;
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: var(--text-dim);
			border-bottom: 1px solid var(--border-subtle);
			margin-bottom: 2px;
		}

		.track-row {
			display: grid;
			grid-template-columns: 40px 1fr 1fr 64px 44px;
			padding: 10px 12px;
			border-radius: 6px;
			align-items: center;
			cursor: pointer;
			transition: background 0.1s;
			min-height: 48px;
		}

			.track-row:hover, .track-row:active {
				background: var(--bg-hover);
			}

			.track-row.playing {
				background: var(--accent-dim);
			}

		.track-num {
			font-family: 'DM Mono', monospace;
			font-size: 12px;
			color: var(--text-dim);
		}

		.track-title-col {
			display: flex;
			flex-direction: column;
			gap: 1px;
			min-width: 0;
		}

		.track-title {
			font-size: 14px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.track-artist-sub {
			font-size: 12px;
			color: var(--text-secondary);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.track-album {
			font-size: 13px;
			color: var(--text-secondary);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.track-duration {
			font-family: 'DM Mono', monospace;
			font-size: 12px;
			color: var(--text-dim);
			text-align: right;
		}

		.track-menu-btn {
			width: 44px;
			height: 44px;
			display: flex;
			align-items: center;
			justify-content: center;
			background: none;
			border: none;
			color: var(--text-dim);
			cursor: pointer;
			border-radius: 50%;
			transition: background 0.15s, color 0.15s;
		}

			.track-menu-btn:hover, .track-menu-btn:active {
				background: var(--bg-hover);
				color: var(--text-primary);
			}

		.view-heading {
			font-size: 24px;
			font-weight: 300;
			margin-bottom: 6px;
		}

		.view-subheading {
			font-size: 13px;
			color: var(--text-dim);
			margin-bottom: 24px;
		}

		.album-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
			gap: 16px;
		}

		.search-section-title {
			font-size: 18px;
			font-weight: 300;
			margin-bottom: 12px;
			margin-top: 20px;
		}

			.search-section-title:first-child {
				margin-top: 0;
			}

		/* Right Panel */
		#right-panel {
			width: 300px;
			min-width: 300px;
			background: var(--bg-surface);
			border-left: 1px solid var(--border-subtle);
			display: flex;
			flex-direction: column;
			align-items: center;
			padding: 24px 20px;
			user-select: none;
		}

		#np-art {
			width: 260px;
			height: 260px;
			background: var(--bg-raised);
			border-radius: 10px;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-dim);
			font-size: 48px;
			overflow: hidden;
			margin-bottom: 20px;
		}

			#np-art img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

		#np-title {
			font-size: 18px;
			font-weight: 500;
			text-align: center;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			width: 100%;
			margin-bottom: 4px;
		}

		#np-artist {
			font-size: 14px;
			color: var(--text-secondary);
			text-align: center;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			width: 100%;
			margin-bottom: 2px;
		}

		#np-album {
			font-size: 13px;
			color: var(--text-dim);
			text-align: center;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			width: 100%;
			margin-bottom: 20px;
		}

		#np-empty {
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-dim);
			font-size: 14px;
		}

		#np-content {
			width: 100%;
			display: none;
		}

		#np-divider {
			width: 100%;
			height: 1px;
			background: var(--border-subtle);
			margin: 20px 0 16px 0;
		}

		#np-next-label {
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: var(--text-dim);
			margin-bottom: 10px;
			align-self: flex-start;
		}

		#np-next-item {
			display: flex;
			align-items: center;
			gap: 12px;
			width: 100%;
			padding: 8px;
			border-radius: 8px;
			cursor: pointer;
			transition: background 0.15s;
		}

			#np-next-item:hover {
				background: var(--bg-hover);
			}

		#np-next-art {
			width: 44px;
			height: 44px;
			border-radius: 6px;
			background: var(--bg-raised);
			flex-shrink: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-dim);
			font-size: 14px;
			overflow: hidden;
		}

			#np-next-art img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

		#np-next-text {
			min-width: 0;
		}

		#np-next-title {
			font-size: 13px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		#np-next-artist {
			font-size: 12px;
			color: var(--text-dim);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		/* FOOTER */
		#player-bar {
			height: 80px;
			min-height: 80px;
			background: var(--bg-surface);
			border-top: 1px solid var(--border-subtle);
			display: flex;
			align-items: center;
			padding: 0 24px;
			gap: 24px;
		}

		#player-track-info {
			display: flex;
			align-items: center;
			gap: 12px;
			width: 240px;
			min-width: 240px;
		}

		#player-art {
			width: 52px;
			height: 52px;
			background: var(--bg-raised);
			border-radius: 6px;
			flex-shrink: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-dim);
			font-size: 18px;
			overflow: hidden;
		}

			#player-art img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

		#player-text {
			min-width: 0;
		}

		#player-title {
			font-size: 14px;
			font-weight: 500;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		#player-artist-name {
			font-size: 12px;
			color: var(--text-secondary);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			margin-top: 1px;
		}

		#player-controls {
			flex: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 6px;
		}

		#player-buttons {
			display: flex;
			align-items: center;
			gap: 20px;
		}

		.player-btn {
			background: none;
			border: none;
			color: var(--text-secondary);
			cursor: pointer;
			width: 44px;
			height: 44px;
			display: flex;
			align-items: center;
			justify-content: center;
			border-radius: 50%;
			transition: color 0.15s, background 0.15s;
		}

			.player-btn:hover, .player-btn:active {
				color: var(--text-primary);
				background: var(--bg-hover);
			}

			.player-btn.active {

		#volume-slider {

		/* Menus */
		#track-menu {
			display: none;

		#playlist-picker {

			padding: 4px 0;

			z-index: 101;

			#playlist-picker .picker-header {

</head>
<body>

	<script>
		let API_USER = 'Rob';
		let API_PARAMS = 'u=' + API_USER + '&p=enc:&v=1.13.0&c=PulseWeb&f=json';
		function apiUrl(ep, ex) { let url = '/rest/' + ep + '?' + API_PARAMS; if (ex) { url = url + '&' + ex; } return url; }
		function apiGet(ep, ex, cb) { let xhr = new XMLHttpRequest(); xhr.open('GET', apiUrl(ep, ex)); xhr.onload = function () { if (xhr.status === 200) { let data = JSON.parse(xhr.responseText); let resp = data['subsonic-response']; if (resp && resp.status === 'ok') { cb(resp); } else { console.error('API error:', ep, resp); } } else { console.error('HTTP error:', ep, xhr.status); } }; xhr.send(); }
		function pulseGet(ep, cb) { let xhr = new XMLHttpRequest(); xhr.open('GET', '/pulse/' + ep); xhr.onload = function () { if (xhr.status === 200) { cb(JSON.parse(xhr.responseText)); } }; xhr.send(); }
		function coverArtUrl(artId, size) {
			if (!artId) { return ''; }
			let sizeParam = '';
			if (size) { sizeParam = '&size=' + size; }
			return apiUrl('getCoverArt', 'id=' + encodeURIComponent(artId) + sizeParam);
		}
		function streamUrl(trackId) { return apiUrl('stream', 'id=' + encodeURIComponent(trackId)); }

		let currentView = 'home'; let navStack = []; let searchTimeout = null;
		let cachedArtists = null; let cachedPlaylists = null;
		let currentAlbumDetail = null; let currentPlaylistDetail = null;
		let leftTab = 'playlists'; let leftSort = 'alpha';
		let audioElement = new Audio(); let playQueue = []; let playQueueIndex = -1;
		let isShuffled = false; let repeatMode = 0; let progressInterval = null; let menuTrackId = null;
		audioElement.volume = 0.7;
		audioElement.addEventListener('ended', function () { if (repeatMode === 2) { audioElement.currentTime = 0; audioElement.play(); } else { playNext(); } });
		audioElement.addEventListener('play', function () { updatePlayButton(true); startProgressUpdates(); });
		audioElement.addEventListener('pause', function () { updatePlayButton(false); stopProgressUpdates(); });

		function updateClock() {
			let now = new Date();
			let days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
			let months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
			let hours = now.getHours();
			let ampm;
			if (hours >= 12) { ampm = 'PM'; } else { ampm = 'AM'; }
			hours = hours % 12;
			if (hours === 0) { hours = 12; }
			let mins = now.getMinutes();
			let minsPad = '';
			if (mins < 10) { minsPad = '0'; }
			document.getElementById('clock').textContent = hours + ':' + minsPad + mins + ' ' + ampm + '  \u00b7  ' + days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
		}
		setInterval(updateClock, 30000); updateClock();

		function showView(viewName) {
			let views = document.querySelectorAll('.center-view');
			for (let idx = 0; idx < views.length; idx++) { views[idx].classList.remove('active'); }
			let target = document.getElementById('view-' + viewName);
			if (target) { target.classList.add('active'); }
			currentView = viewName;
			let backDisplay;
			if (navStack.length > 0) { backDisplay = 'flex'; } else { backDisplay = 'none'; }
			document.getElementById('back-btn').style.display = backDisplay;
			if (viewName !== 'search') { document.getElementById('search-input').value = ''; }
			if (viewName === 'home') { loadHomeScreen(); }
			document.getElementById('center-panel').scrollTop = 0;
		}
		function navigateWithHistory(viewName) { navStack.push(currentView); showView(viewName); }
		function goBack()
		{
			showView('home');
			/*if (navStack.length === 0) {
				showView('home');
				return;
			}
			showView(navStack.pop());*/
		}

		function formatDuration(seconds) {
			let mins = Math.floor(seconds / 60);
			let secs = seconds % 60;
			let secsPad = '';
			if (secs < 10) { secsPad = '0'; }
			return mins + ':' + secsPad + secs;
		}
		function makeArtistInitials(name) { let words = name.split(' '); if (words.length === 1) { return name.substring(0, 2).toUpperCase(); } return (words[0][0] + words[words.length - 1][0]).toUpperCase(); }
		function escapeHtml(text) { if (!text) { return ''; } let div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
		function shuffleArray(arr) { for (let idx = arr.length - 1; idx > 0; idx--) { let swapIdx = Math.floor(Math.random() * (idx + 1)); let temp = arr[idx]; arr[idx] = arr[swapIdx]; arr[swapIdx] = temp; } }
		function artHtml(artId, size) {
			if (artId) {
				return '<img src="' + coverArtUrl(artId, size) + '" loading="lazy" />';
			}
			return '&#9835;';
		}

		function buildTrackRow(song, rowNumber, onClickFn) { let row = document.createElement('div'); row.className = 'track-row'; row.setAttribute('data-track-id', song.id); row.onclick = onClickFn; row.innerHTML = '<span class="track-num">' + rowNumber + '</span><div class="track-title-col"><span class="track-title">' + escapeHtml(song.title) + '</span><span class="track-artist-sub">' + escapeHtml(song.artist) + '</span></div><span class="track-album">' + escapeHtml(song.album || '') + '</span><span class="track-duration">' + formatDuration(song.duration) + '</span><button class="track-menu-btn" onclick="openTrackMenu(event, \'' + song.id + '\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg></button>'; return row; }
		function buildCarouselCard(artId, name, sub, onClick, round) {
			let card = document.createElement('div');
			card.className = 'carousel-card';
			card.onclick = onClick;
			let roundClass = '';
			if (round) { roundClass = ' round'; }
			let subHtml = '';
			if (sub) { subHtml = '<div class="carousel-card-sub">' + escapeHtml(sub) + '</div>'; }
			card.innerHTML = '<div class="carousel-card-art' + roundClass + '">' + artHtml(artId, 300) + '</div><div class="carousel-card-name">' + escapeHtml(name) + '</div>' + subHtml;
			return card;
		}
		function buildCompositeArt(songs, size) { let uniqueArts = []; let seen = {}; for (let idx = 0; idx < songs.length; idx++) { let artId = songs[idx].coverArt; if (artId && !seen[artId]) { seen[artId] = true; uniqueArts.push(artId); if (uniqueArts.length >= 4) { break; } } } if (uniqueArts.length === 0) { return '&#9835;'; } if (uniqueArts.length === 1) { return '<img src="' + coverArtUrl(uniqueArts[0], size) + '" />'; } let html = '<div style="display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; width:100%; height:100%;">'; for (let idx = 0; idx < 4; idx++) { html = html + '<img src="' + coverArtUrl(uniqueArts[idx % uniqueArts.length], Math.floor(size / 2)) + '" style="width:100%; height:100%; object-fit:cover;" />'; } return html + '</div>'; }

		/* Left Panel */
		function switchLeftTab(tab) { leftTab = tab; let tabs = document.querySelectorAll('.left-tab'); for (let idx = 0; idx < tabs.length; idx++) { tabs[idx].classList.remove('active'); if ((tab === 'playlists' && idx === 0) || (tab === 'artists' && idx === 1)) { tabs[idx].classList.add('active'); } } renderLeftList(); }
		function setLeftSort(sort) { leftSort = sort; let btns = document.querySelectorAll('.sort-btn'); for (let idx = 0; idx < btns.length; idx++) { btns[idx].classList.remove('active'); if (btns[idx].getAttribute('data-sort') === sort) { btns[idx].classList.add('active'); } } renderLeftList(); }
		function renderLeftList() { let container = document.getElementById('left-list'); container.innerHTML = ''; if (leftTab === 'playlists') { renderLeftPlaylists(container); } else { renderLeftArtists(container); } }
		function renderLeftPlaylists(container) { if (!cachedPlaylists) { container.innerHTML = '<div class="loading-text">Loading...</div>'; apiGet('getPlaylists', null, function (resp) { cachedPlaylists = resp.playlists.playlist || []; renderLeftPlaylists(container); }); return; } let sorted = cachedPlaylists.slice(); if (leftSort === 'alpha') { sorted.sort(function (left, right) { return left.name.localeCompare(right.name); }); } else if (leftSort === 'popular') { sorted.sort(function (left, right) { return right.songCount - left.songCount; }); } container.innerHTML = ''; for (let idx = 0; idx < sorted.length; idx++) { let playlist = sorted[idx]; let item = document.createElement('div'); item.className = 'left-item'; item.onclick = (function (pid) { return function () { navStack = []; openPlaylist(pid); }; })(playlist.id); item.innerHTML = '<div class="left-item-art">&#9835;</div><div class="left-item-text"><div class="left-item-name">' + escapeHtml(playlist.name) + '</div><div class="left-item-sub">' + playlist.songCount + ' tracks</div></div>'; container.appendChild(item); } }
		function renderLeftArtists(container) { if (!cachedArtists) { container.innerHTML = '<div class="loading-text">Loading...</div>'; apiGet('getArtists', null, function (resp) { cachedArtists = []; let indexes = resp.artists.index; for (let idx = 0; idx < indexes.length; idx++) { let list = indexes[idx].artist; for (let aidx = 0; aidx < list.length; aidx++) { cachedArtists.push(list[aidx]); } } renderLeftArtists(container); }); return; } let sorted = cachedArtists.slice(); if (leftSort === 'alpha') { sorted.sort(function (left, right) { return left.name.localeCompare(right.name); }); } else if (leftSort === 'popular') { sorted.sort(function (left, right) { return (right.albumCount || 0) - (left.albumCount || 0); }); } container.innerHTML = ''; for (let idx = 0; idx < sorted.length; idx++) { let artist = sorted[idx]; let avatarHtml;
				if (artist.coverArt) { avatarHtml = '<img src="' + coverArtUrl(artist.coverArt, 80) + '" style="border-radius:50%;" />'; }
				else { avatarHtml = makeArtistInitials(artist.name); } let item = document.createElement('div'); item.className = 'left-item'; item.onclick = (function (aid) { return function () { navStack = []; openArtist(aid); }; })(artist.id); item.innerHTML = '<div class="left-item-art round">' + avatarHtml + '</div><div class="left-item-text"><div class="left-item-name">' + escapeHtml(artist.name) + '</div><div class="left-item-sub">' + artist.albumCount + ' albums</div></div>'; container.appendChild(item); } }

		/* Home */
		function loadHomeScreen() { loadQuickGrid(); loadRecentCarousel(); loadPlaylistCarousel(); loadPopularArtistsCarousel(); }
		function loadQuickGrid() {
			let grid = document.getElementById('home-quick-grid');
			grid.innerHTML = ''; apiGet('getPlaylists', null,
				function (resp)
				{
					let playlists = resp.playlists.playlist || [];
					let limit = Math.min(8, playlists.length);
					for (let idx = 0; idx < limit; idx++)
					{
						(function (playlist)
						{
							let item = document.createElement('div');
							item.className = 'quick-item';
							item.onclick = function ()
							{
								navStack = []; openPlaylist(playlist.id);
							};
							let playBtn = '<button class="quick-item-play" onclick="event.stopPropagation(); quickPlayPlaylist(\'' + playlist.id + '\')" title="Play"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>';

							item.innerHTML = '<div class="quick-item-art">&#9835;</div><div class="quick-item-name">' + escapeHtml(playlist.name) + '</div>' + playBtn;
							grid.appendChild(item);
							apiGet('getPlaylist', 'id=' + encodeURIComponent(playlist.id), function (r) { let songs = r.playlist.entry || []; item.querySelector('.quick-item-art').innerHTML = buildCompositeArt(songs, 112); });
						})(playlists[idx]);
					}
				});
		}
		function quickPlayPlaylist(playlistId) {
			apiGet('getPlaylist', 'id=' + encodeURIComponent(playlistId), function(resp) {
				let songs = resp.playlist.entry || [];
				if (songs.length > 0) {
					playTrackList(songs, 0);
				}
			});
		}
		function loadRecentCarousel() { let scroll = document.getElementById('home-recent-scroll'); scroll.innerHTML = '<div class="loading-text">Loading...</div>'; pulseGet('recentlyPlayed?count=10&u=' + API_USER, function (data) { let tracks = data.tracks || []; scroll.innerHTML = ''; if (tracks.length === 0) { scroll.innerHTML = '<div class="loading-text">No recent plays yet</div>'; return; } for (let idx = 0; idx < tracks.length; idx++) { let song = tracks[idx]; let card = buildCarouselCard(song.coverArt, song.title, song.artist, (function (tl, ti) { return function () { playTrackList(tl, ti); }; })(tracks, idx), false); scroll.appendChild(card); } }); }
		function loadPlaylistCarousel() { let scroll = document.getElementById('home-playlists-scroll'); scroll.innerHTML = '<div class="loading-text">Loading...</div>'; apiGet('getPlaylists', null, function (resp) { let playlists = resp.playlists.playlist || []; scroll.innerHTML = ''; let limit = Math.min(10, playlists.length); for (let idx = 0; idx < limit; idx++) { (function (playlist) { let card = buildCarouselCard(null, playlist.name, playlist.songCount + ' tracks', function () { navStack = []; openPlaylist(playlist.id); }, false); scroll.appendChild(card); apiGet('getPlaylist', 'id=' + encodeURIComponent(playlist.id), function (r) { let songs = r.playlist.entry || []; card.querySelector('.carousel-card-art').innerHTML = buildCompositeArt(songs, 300); }); })(playlists[idx]); } }); }
		function loadPopularArtistsCarousel() { let scroll = document.getElementById('home-artists-scroll'); scroll.innerHTML = '<div class="loading-text">Loading...</div>'; pulseGet('popularArtists?count=10', function (data) { let artists = data.artists || []; scroll.innerHTML = ''; if (artists.length === 0) { scroll.innerHTML = '<div class="loading-text">Play some music first</div>'; return; } for (let idx = 0; idx < artists.length; idx++) { let artist = artists[idx]; let card = buildCarouselCard(artist.coverArt || null, artist.name, artist.playCount + ' plays', (function (aid) { return function () { navStack = []; openArtist(aid); }; })(artist.id), true); scroll.appendChild(card); } }); }

		/* Artist Detail */
		function openArtist(artistId) { apiGet('getArtist', 'id=' + encodeURIComponent(artistId), function (resp) { let artist = resp.artist; document.getElementById('artist-detail-name').textContent = artist.name; document.getElementById('artist-detail-count').textContent = artist.albumCount + ' albums'; let grid = document.getElementById('artist-album-grid'); grid.innerHTML = ''; let albums = artist.album || []; for (let idx = 0; idx < albums.length; idx++) { let album = albums[idx]; let card = document.createElement('div'); card.className = 'carousel-card'; card.onclick = (function (aid) { return function () { openAlbum(aid); }; })(album.id); card.innerHTML = '<div class="carousel-card-art">' + artHtml(album.coverArt, 300) + '</div><div class="carousel-card-name">' + escapeHtml(album.name) + '</div><div class="carousel-card-sub">' + (album.year || '') + '</div>'; grid.appendChild(card); } navigateWithHistory('artist-detail'); }); }

		/* Album Detail */
		function openAlbum(albumId) { apiGet('getAlbum', 'id=' + encodeURIComponent(albumId), function (resp) { currentAlbumDetail = resp.album; let album = currentAlbumDetail; document.getElementById('album-detail-name').textContent = album.name; document.getElementById('album-detail-artist').textContent = album.artist; document.getElementById('album-detail-artist').setAttribute('data-artist-id', album.artistId); let songs = album.song || []; let totalDuration = 0; for (let idx = 0; idx < songs.length; idx++) { totalDuration = totalDuration + songs[idx].duration; } document.getElementById('album-detail-meta').textContent = songs.length + ' tracks \u00b7 ' + Math.floor(totalDuration / 60) + ' min'; document.getElementById('album-detail-art').innerHTML = artHtml(album.coverArt, 400); let tracksEl = document.getElementById('album-detail-tracks'); tracksEl.innerHTML = ''; for (let idx = 0; idx < songs.length; idx++) { let row = buildTrackRow(songs[idx], idx + 1, (function (sl, si) { return function () { playTrackList(sl, si); }; })(songs, idx)); tracksEl.appendChild(row); } navigateWithHistory('album-detail'); }); }
		function onAlbumArtistClick() { let artistId = document.getElementById('album-detail-artist').getAttribute('data-artist-id'); if (artistId) { openArtist(artistId); } }
		function playAlbum() { if (currentAlbumDetail && currentAlbumDetail.song) { playTrackList(currentAlbumDetail.song, 0); } }
		function shuffleAlbum() { if (currentAlbumDetail && currentAlbumDetail.song) { let shuffled = currentAlbumDetail.song.slice(); shuffleArray(shuffled); playTrackList(shuffled, 0); } }

		/* Playlist Detail */
		function openPlaylist(playlistId) { apiGet('getPlaylist', 'id=' + encodeURIComponent(playlistId), function (resp) { currentPlaylistDetail = resp.playlist; let playlist = currentPlaylistDetail; document.getElementById('playlist-detail-name').textContent = playlist.name; document.getElementById('playlist-detail-meta').textContent = playlist.songCount + ' tracks \u00b7 ' + Math.floor(playlist.duration / 60) + ' min'; let songs = playlist.entry || []; document.getElementById('playlist-detail-art').innerHTML = buildCompositeArt(songs, 400); let tracksEl = document.getElementById('playlist-tracks'); tracksEl.innerHTML = ''; for (let idx = 0; idx < songs.length; idx++) { let row = buildTrackRow(songs[idx], idx + 1, (function (sl, si) { return function () { playTrackList(sl, si); }; })(songs, idx)); tracksEl.appendChild(row); } navigateWithHistory('playlist-detail'); }); }
		function playPlaylist() { if (currentPlaylistDetail && currentPlaylistDetail.entry) { playTrackList(currentPlaylistDetail.entry, 0); } }
		function shufflePlaylist() { if (currentPlaylistDetail && currentPlaylistDetail.entry) { let shuffled = currentPlaylistDetail.entry.slice(); shuffleArray(shuffled); playTrackList(shuffled, 0); } }

		/* Search */
		function onSearchInput(value) { if (searchTimeout) { clearTimeout(searchTimeout); } if (value.length === 0) { if (currentView === 'search') { navStack = []; showView('home'); } return; } searchTimeout = setTimeout(function () { performSearch(value); }, 300); }
		function performSearch(query) { navStack.push(currentView); showView('search'); document.getElementById('search-input').value = query; document.getElementById('search-result-count').textContent = 'Searching...'; document.getElementById('search-results').innerHTML = ''; apiGet('search3', 'query=' + encodeURIComponent(query) + '&artistCount=10&albumCount=20&songCount=30', function (resp) { let results = resp.searchResult3; let container = document.getElementById('search-results'); container.innerHTML = ''; let artists = results.artist || []; let albums = results.album || []; let songs = results.song || []; let totalHits = artists.length + albums.length + songs.length; document.getElementById('search-result-count').textContent = totalHits + ' results for "' + query + '"'; if (artists.length > 0) { let heading = document.createElement('div'); heading.className = 'search-section-title'; heading.textContent = 'Artists'; container.appendChild(heading); let scroll = document.createElement('div'); scroll.className = 'carousel-scroll'; for (let idx = 0; idx < artists.length; idx++) { let card = buildCarouselCard(artists[idx].coverArt || null, artists[idx].name, artists[idx].albumCount + ' albums', (function (aid) { return function () { openArtist(aid); }; })(artists[idx].id), true); scroll.appendChild(card); } container.appendChild(scroll); } if (albums.length > 0) { let heading = document.createElement('div'); heading.className = 'search-section-title'; heading.textContent = 'Albums'; container.appendChild(heading); let scroll = document.createElement('div'); scroll.className = 'carousel-scroll'; for (let idx = 0; idx < albums.length; idx++) { let card = buildCarouselCard(albums[idx].coverArt, albums[idx].name, albums[idx].artist, (function (aid) { return function () { openAlbum(aid); }; })(albums[idx].id), false); scroll.appendChild(card); } container.appendChild(scroll); } if (songs.length > 0) { let heading = document.createElement('div'); heading.className = 'search-section-title'; heading.textContent = 'Songs'; container.appendChild(heading); for (let idx = 0; idx < songs.length; idx++) { let row = buildTrackRow(songs[idx], idx + 1, (function (sl, si) { return function () { playTrackList(sl, si); }; })(songs, idx)); container.appendChild(row); } } if (totalHits === 0) { container.innerHTML = '<div class="empty-state"><div class="empty-state-text">No results found</div></div>'; } }); }

		/* Track Menu */
		function openTrackMenu(event, trackId) {
			event.stopPropagation();
			menuTrackId = trackId;
			let menu = document.getElementById('track-menu');
			let rect = event.currentTarget.getBoundingClientRect();
			menu.style.display = 'block';
			menu.style.top = rect.bottom + 'px';
			menu.style.right = (window.innerWidth - rect.right) + 'px';
			menu.style.left = 'auto';
			let removeDisplay;
			if (currentView === 'playlist-detail' && currentPlaylistDetail) { removeDisplay = 'flex'; } else { removeDisplay = 'none'; }
			menu.querySelector('.menu-item-remove').style.display = removeDisplay;
			document.getElementById('playlist-picker').style.display = 'none';
		}
		function showPlaylistPicker() { let menu = document.getElementById('track-menu'); let picker = document.getElementById('playlist-picker'); let pickerList = document.getElementById('picker-list'); picker.style.top = menu.style.top; picker.style.right = menu.style.right; picker.style.left = 'auto'; menu.style.display = 'none'; pickerList.innerHTML = ''; apiGet('getPlaylists', null, function (resp) { let playlists = resp.playlists.playlist || []; for (let idx = 0; idx < playlists.length; idx++) { let item = document.createElement('div'); item.className = 'picker-item'; item.textContent = playlists[idx].name; item.onclick = (function (pid) { return function () { addTrackToPlaylist(pid); }; })(playlists[idx].id); pickerList.appendChild(item); } picker.style.display = 'block'; }); }
		function addTrackToPlaylist(playlistId) { document.getElementById('playlist-picker').style.display = 'none'; if (!menuTrackId) { return; } apiGet('updatePlaylist', 'playlistId=' + encodeURIComponent(playlistId) + '&songIdToAdd=' + encodeURIComponent(menuTrackId), function (resp) { menuTrackId = null; }); }
		function removeFromPlaylist() { document.getElementById('track-menu').style.display = 'none'; if (!menuTrackId || !currentPlaylistDetail) { return; } let songs = currentPlaylistDetail.entry || []; let removeIndex = -1; for (let idx = 0; idx < songs.length; idx++) { if (songs[idx].id === menuTrackId) { removeIndex = idx; break; } } if (removeIndex < 0) { return; } apiGet('updatePlaylist', 'playlistId=' + encodeURIComponent(currentPlaylistDetail.id) + '&songIndexToRemove=' + removeIndex, function (resp) { openPlaylist(currentPlaylistDetail.id); menuTrackId = null; }); }
		document.addEventListener('click', function () { document.getElementById('track-menu').style.display = 'none'; document.getElementById('playlist-picker').style.display = 'none'; });

		/* Playback */
		function playTrackList(songs, startIndex) { playQueue = songs.slice(); playQueueIndex = startIndex; playCurrentTrack(); }
		function playCurrentTrack() { if (playQueueIndex < 0 || playQueueIndex >= playQueue.length) { return; } let song = playQueue[playQueueIndex]; audioElement.src = streamUrl(song.id); audioElement.play(); document.getElementById('player-title').textContent = song.title; document.getElementById('player-artist-name').textContent = song.artist; document.getElementById('player-time-total').textContent = formatDuration(song.duration); document.getElementById('player-time-current').textContent = '0:00'; document.getElementById('player-progress-fill').style.width = '0%'; document.getElementById('player-art').innerHTML = artHtml(song.coverArt, 104); document.getElementById('np-empty').style.display = 'none'; document.getElementById('np-content').style.display = 'block'; document.getElementById('np-art').innerHTML = artHtml(song.coverArt, 520); document.getElementById('np-title').textContent = song.title; document.getElementById('np-artist').textContent = song.artist; document.getElementById('np-album').textContent = song.album || ''; updateNextTrack(); highlightPlayingTrack(song.id); }
		function updateNextTrack() { let nextIdx = playQueueIndex + 1; if (nextIdx < playQueue.length) { let next = playQueue[nextIdx]; document.getElementById('np-next-label').style.display = 'block'; document.getElementById('np-next-item').style.display = 'flex'; document.getElementById('np-next-art').innerHTML = artHtml(next.coverArt, 88); document.getElementById('np-next-title').textContent = next.title; document.getElementById('np-next-artist').textContent = next.artist; } else { document.getElementById('np-next-label').style.display = 'none'; document.getElementById('np-next-item').style.display = 'none'; } }
		function highlightPlayingTrack(trackId) { let allRows = document.querySelectorAll('.track-row'); for (let idx = 0; idx < allRows.length; idx++) { allRows[idx].classList.remove('playing'); if (allRows[idx].getAttribute('data-track-id') === trackId) { allRows[idx].classList.add('playing'); } } }
		function togglePlayPause() { if (audioElement.src === '') { return; } if (audioElement.paused) { audioElement.play(); } else { audioElement.pause(); } }
		function updatePlayButton(isPlaying) {
			let playDisplay;
			let pauseDisplay;
			if (isPlaying) { playDisplay = 'none'; pauseDisplay = 'block'; }
			else { playDisplay = 'block'; pauseDisplay = 'none'; }
			document.getElementById('play-icon').style.display = playDisplay;
			document.getElementById('pause-icon').style.display = pauseDisplay;
		}
		function playNext() { if (playQueue.length === 0) { return; } playQueueIndex = playQueueIndex + 1; if (playQueueIndex >= playQueue.length) { if (repeatMode === 1) { playQueueIndex = 0; } else { playQueueIndex = playQueue.length - 1; audioElement.pause(); return; } } playCurrentTrack(); }
		function playPrevious() { if (playQueue.length === 0) { return; } if (audioElement.currentTime > 3) { audioElement.currentTime = 0; return; } playQueueIndex = playQueueIndex - 1; if (playQueueIndex < 0) { if (repeatMode === 1) { playQueueIndex = playQueue.length - 1; } else { playQueueIndex = 0; } } playCurrentTrack(); }
		function toggleShuffle() { isShuffled = !isShuffled; let btn = document.getElementById('btn-shuffle'); if (isShuffled) { btn.classList.add('active'); if (playQueue.length > 1 && playQueueIndex >= 0) { let remaining = playQueue.slice(playQueueIndex + 1); shuffleArray(remaining); playQueue = playQueue.slice(0, playQueueIndex + 1).concat(remaining); } } else { btn.classList.remove('active'); } }
		function toggleRepeat() { repeatMode = (repeatMode + 1) % 3; let btn = document.getElementById('btn-repeat'); if (repeatMode === 0) { btn.classList.remove('active'); } else { btn.classList.add('active'); } }
		function startProgressUpdates() { stopProgressUpdates(); progressInterval = setInterval(updateProgress, 500); }
		function stopProgressUpdates() { if (progressInterval) { clearInterval(progressInterval); progressInterval = null; } }
		function updateProgress() { if (audioElement.duration && !isNaN(audioElement.duration)) { let current = Math.floor(audioElement.currentTime); let pct = (audioElement.currentTime / audioElement.duration) * 100; document.getElementById('player-time-current').textContent = formatDuration(current); document.getElementById('player-progress-fill').style.width = pct + '%'; } }
		function seekTo(event) { let bar = document.getElementById('player-progress-bar'); let rect = bar.getBoundingClientRect(); let pct = (event.clientX - rect.left) / rect.width; if (pct < 0) { pct = 0; } if (pct > 1) { pct = 1; } if (audioElement.duration && !isNaN(audioElement.duration)) { audioElement.currentTime = pct * audioElement.duration; updateProgress(); } }
		function setVolume(event) { let bar = document.getElementById('volume-slider'); let rect = bar.getBoundingClientRect(); let pct = (event.clientX - rect.left) / rect.width; if (pct < 0) { pct = 0; } if (pct > 1) { pct = 1; } audioElement.volume = pct; document.getElementById('volume-fill').style.width = (pct * 100) + '%'; }

		/* Init */
		showView('home');
		renderLeftList();
	</script>
</body>
</html>
