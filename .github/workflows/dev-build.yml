name: Dev Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish Pulse/Pulse.csproj --configuration Release --output publish /p:Version=0.0.0-dev.${{ github.run_number }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pulse-dev-${{ github.sha }}
          path: publish/Pulse.exe
          retention-days: 14
          if-no-files-found: error
