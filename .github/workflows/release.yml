name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          dotnet publish Pulse/Pulse.csproj --configuration Release --output publish -p:Version="${VERSION}"
          # Compact version tag for the exe filename: drop dots, keep
          # everything else (e.g. 0.2.6 -> 026, 1.0.0-rc.1 -> 100-rc1).
          EXE_NAME="pulse_${VERSION//./}.exe"
          mv publish/Pulse.exe "publish/${EXE_NAME}"
          echo "EXE_NAME=${EXE_NAME}" >> "${GITHUB_ENV}"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "Pulse ${{ inputs.version }}" \
            --generate-notes \
            "publish/${EXE_NAME}"
