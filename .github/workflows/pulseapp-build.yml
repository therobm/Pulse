name: PulseApp Build and Release

# Android release pipeline for the PulseApp MAUI client in the monorepo. Triggers
# only when the app or the shared contract changes (path filter below), so a
# server-only commit never spins up the Android toolchain. Versioned straight
# from VERSION_PULSEAPP (full Major.Minor.Build), publishes a GitHub Release tagged
# pulseapp-v<version>, then increments the build component in VERSION_PULSEAPP and
# commits it back to master ([skip ci], repo token, so it does not re-trigger).
# To bump the major or minor version, edit VERSION_PULSEAPP by hand and reset the
# build (e.g. 0.3.28 -> 0.4.0). The Android versionCode is the total repo commit
# count, a separate always-increasing integer (the displayed Build resets on a
# Major/Minor bump, so it can't drive versionCode). Signing comes from repo
# secrets (ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS
# / ANDROID_KEY_PASSWORD); the keystore never lives in the repo.

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'PulseApp/**'
      # Only the C# contract is consumed by PulseApp; PulseAPI/JS is the web
      # client and must not trigger an Android release build.
      - 'PulseAPI/CSharp/**'
      # PulseApp's version lives in the repo root (renamed from PulseApp/VERSION so
      # the two version files are unambiguous); a manual bump must trigger.
      - 'VERSION_PULSEAPP'

permissions:
  contents: write

concurrency:
  group: pulseapp-build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          # Full history so the Android versionCode can count total commits,
          # and so the build-number bump can be committed back to master.
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Read version
        id: version
        shell: bash
        run: |
          version=$(tr -d ' \t\r\n' < VERSION_PULSEAPP)
          if ! echo "$version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "VERSION_PULSEAPP must be MAJOR.MINOR.BUILD; got '$version'" >&2
            exit 1
          fi
          code=$(git rev-list --count HEAD)
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "code=${code}" >> "$GITHUB_OUTPUT"
          echo "Version: ${version} (versionCode ${code})"

      - name: Decode keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/pulseapp-release.jks"

      - name: Publish signed APK
        shell: bash
        run: |
          dotnet publish PulseApp/PulseApp.csproj \
            -f net10.0-android \
            -c Release \
            -p:ApplicationDisplayVersion="${{ steps.version.outputs.version }}" \
            -p:ApplicationVersion="${{ steps.version.outputs.code }}" \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore="$RUNNER_TEMP/pulseapp-release.jks" \
            -p:AndroidSigningStorePass='${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' \
            -p:AndroidSigningKeyAlias='${{ secrets.ANDROID_KEY_ALIAS }}' \
            -p:AndroidSigningKeyPass='${{ secrets.ANDROID_KEY_PASSWORD }}'

      - name: Stage release artifact
        id: stage
        shell: bash
        run: |
          mkdir -p artifacts
          apk=$(find . -name '*-Signed.apk' -path '*Release*' | head -1)
          if [ -z "$apk" ]; then
            echo "No signed APK found under a Release path." >&2
            find . -name '*.apk' >&2 || true
            exit 1
          fi
          cp "$apk" "artifacts/Pulse-${{ steps.version.outputs.version }}.apk"
          echo "apk=artifacts/Pulse-${{ steps.version.outputs.version }}.apk" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pulseapp-v${{ steps.version.outputs.version }}
          name: Pulse v${{ steps.version.outputs.version }}
          files: ${{ steps.stage.outputs.apk }}
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Increment build number in VERSION_PULSEAPP
        shell: bash
        run: |
          git config user.name "Vibratron"
          git config user.email "vibratron@flatline.local"
          # master may have moved (e.g. a PulseAPI/CSharp commit also triggered
          # the server build, which bumps VERSION_PULSE and pushes). Recompute from
          # the freshest master and retry so the two bump-pushes don't collide.
          for attempt in $(seq 1 5); do
            git fetch origin master
            git checkout -B pulseapp-version-bump origin/master
            cur=$(tr -d ' \t\r\n' < VERSION_PULSEAPP)
            major=$(echo "$cur" | cut -d. -f1)
            minor=$(echo "$cur" | cut -d. -f2)
            build=$(echo "$cur" | cut -d. -f3)
            next="${major}.${minor}.$((build + 1))"
            printf '%s\n' "$next" > VERSION_PULSEAPP
            git add VERSION_PULSEAPP
            git commit -m "Bump PulseApp build to ${next} [skip ci]"
            if git push origin HEAD:master; then
              echo "Pushed VERSION_PULSEAPP bump -> ${next}"
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); master moved, retrying." >&2
          done
          echo "Failed to push VERSION_PULSEAPP bump after 5 attempts." >&2
          exit 1
