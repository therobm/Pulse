name: Dev Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        shell: bash
        env:
          VERSION: 0.0.0-dev.${{ github.run_number }}
        run: |
          dotnet publish Pulse/Pulse.csproj --configuration Release --output publish -p:Version="${VERSION}"
          # Compact version tag for the exe filename: drop dots, keep
          # everything else (e.g. 0.0.0-dev.45 -> 000-dev45).
          EXE_NAME="pulse_${VERSION//./}.exe"
          mv publish/Pulse.exe "publish/${EXE_NAME}"
          echo "EXE_NAME=${EXE_NAME}" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pulse-dev-${{ github.sha }}
          path: publish/${{ env.EXE_NAME }}
          retention-days: 14
          if-no-files-found: error
