name: Dev Build

# Manual, on-demand build of a test exe off any branch. Produces the same
# self-contained win-x64 single-file exe as the release workflow but uploads
# it as a build artifact instead of cutting a GitHub Release. The version is
# the same Major.Minor.Build with a -dev suffix.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Compute version
        id: version
        shell: bash
        run: |
          version="$(bash .github/version.sh)-dev"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Version: ${version}"

      - name: Publish
        shell: bash
        run: |
          dotnet publish Pulse/Pulse.csproj \
            -c Release \
            -p:Version="${{ steps.version.outputs.version }}" \
            -o publish

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p artifacts
          mv publish/Pulse.exe "artifacts/Pulse-${{ steps.version.outputs.version }}-win-x64.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pulse-dev-${{ github.sha }}
          path: artifacts/Pulse-${{ steps.version.outputs.version }}-win-x64.exe
          retention-days: 14
          if-no-files-found: error
